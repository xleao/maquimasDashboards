<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Maqui - Enterprise BI Portal</title>
        <!-- Google Fonts: Inter -->
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <!-- FontAwesome Icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <!-- Chart.js CDN -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <!-- Plugin de etiquetas de datos -->
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

        <style>
            /* VARIABLES DE DISEÑO (PALETA DE COLORES Y NEUMORFISMO) */
            :root {
                --color-logo-red: #f01515;
                --color-turquoise-medium: #008296;
                --color-turquoise-dark: #025763;
                --color-bg-gray: #f0f0f0; /* Plomo muy claro para botones */
                --color-card-gray: #f7f7f7; /* Plomo muy claro para tarjetas */

                /* Sombras suaves (blanco atenuado para evitar el "resplandor") */
                --shadow-light: rgba(255, 255, 255, 0.6);
                --shadow-dark: rgba(0, 0, 0, 0.09);

                --shadow-raised:
                    5px 5px 12px var(--shadow-dark),
                    -4px -4px 10px var(--shadow-light);
                --shadow-raised-sm:
                    3px 3px 7px var(--shadow-dark),
                    -2px -2px 6px var(--shadow-light);
                --shadow-sunken:
                    inset 4px 4px 9px var(--shadow-dark),
                    inset -3px -3px 7px var(--shadow-light);
                --shadow-sunken-sm:
                    inset 2px 2px 5px var(--shadow-dark),
                    inset -2px -2px 4px var(--shadow-light);

                --transition-speed: 0.3s;
            }

            /* RESET & BASE STYLES */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: #ffffff;
                font-family: "Inter", sans-serif;
                color: var(--color-turquoise-dark);
                display: flex;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* NAV / SIDEBAR */
            .sidebar {
                width: 280px;
                background-color: #ffffff;
                box-shadow:
                    8px 0 24px var(--shadow-dark),
                    -8px 0 24px var(--shadow-light);
                border-radius: 0 24px 24px 0;
                padding: 35px 25px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                z-index: 100;
                transition: transform var(--transition-speed) ease;
            }

            .sidebar-top {
                display: flex;
                flex-direction: column;
                gap: 22px;
            }

            /* Logo Area */
            .logo-container {
                display: flex;
                align-items: center;
                gap: 12px;
                padding-left: 10px;
            }

            .logo-img {
                height: 62px;
                width: auto;
                max-width: 100%;
                object-fit: contain;
                filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.1));
            }

            .logo-icon {
                font-size: 26px;
                color: var(--color-turquoise-medium);
                filter: drop-shadow(2px 2px 4px var(--shadow-dark));
            }

            .logo-text {
                font-size: 20px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                letter-spacing: -0.5px;
            }

            /* Country Selector */
            .country-selector {
                border: 2px solid rgba(0, 130, 150, 0.2);
                border-radius: 16px;
                padding: 14px 18px;
                margin-top: 8px;
                margin-bottom: 8px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                background-color: var(--color-card-gray);
                box-shadow: var(--shadow-raised-sm);
            }

            .country-selector legend {
                padding: 0 8px;
                font-size: 12px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
            }

            .country-option {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 13.5px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
                cursor: pointer;
                user-select: none;
                position: relative;
            }

            .country-option input {
                position: absolute;
                opacity: 0;
                cursor: pointer;
                height: 0;
                width: 0;
            }

            .radio-custom {
                height: 16px;
                width: 16px;
                background-color: var(--color-bg-gray);
                border-radius: 50%;
                box-shadow: var(--shadow-sunken-sm);
                display: inline-block;
                position: relative;
                transition: all 0.2s ease;
            }

            .country-option input:checked ~ .radio-custom {
                background-color: var(--color-card-gray);
                box-shadow: var(--shadow-raised-sm);
            }

            .radio-custom::after {
                content: "";
                position: absolute;
                display: none;
                top: 4px;
                left: 4px;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: var(--color-turquoise-medium);
            }

            .country-option input:checked ~ .radio-custom::after {
                display: block;
            }

            /* Accordion Navigation */
            .accordion-nav {
                display: flex;
                flex-direction: column;
                gap: 10px;
                overflow-y: auto;
                max-height: calc(100vh - 260px);
                padding-right: 5px;
                padding-bottom: 20px;
                flex: 1;
            }

            .menu-category {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }

            .category-header {
                width: 100%;
                background: none;
                border: none;
                padding: 10px 14px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14.5px;
                font-weight: 700;
                color: var(--color-turquoise-dark);
                cursor: pointer;
                text-align: left;
                border-radius: 12px;
                transition: background-color var(--transition-speed);
            }

            .category-header:hover {
                background-color: rgba(0, 130, 150, 0.06);
            }

            .category-header .arrow-icon {
                font-size: 10px;
                transition: transform var(--transition-speed) ease;
                color: var(--color-turquoise-medium);
            }

            .menu-category.expanded .category-header .arrow-icon {
                transform: rotate(90deg);
            }

            .category-list {
                list-style: none;
                display: none;
                flex-direction: column;
                gap: 4px;
                padding-left: 16px;
                border-left: 2px dashed rgba(0, 130, 150, 0.15);
                margin-left: 8px;
            }

            .menu-category.expanded .category-list {
                display: flex;
            }

            .sub-btn {
                width: 100%;
                background: none;
                border: none;
                padding: 8px 12px;
                font-size: 13px;
                font-weight: 500;
                color: var(--color-turquoise-medium);
                text-align: left;
                cursor: pointer;
                border-radius: 10px;
                transition: all var(--transition-speed) ease;
                outline: none;
            }

            .sub-btn:hover {
                color: var(--color-turquoise-dark);
                background-color: rgba(0, 130, 150, 0.05);
                padding-left: 15px;
            }

            .sub-btn.active {
                font-weight: 700;
                color: var(--color-turquoise-dark);
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-sunken-sm);
            }

            /* Nested Category (Otros) */
            .nested-category {
                display: flex;
                flex-direction: column;
                gap: 3px;
                margin-top: 4px;
            }

            .nested-category-header {
                width: 100%;
                background: none;
                border: none;
                padding: 8px 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-medium);
                cursor: pointer;
                text-align: left;
                border-radius: 10px;
                transition: all var(--transition-speed) ease;
                outline: none;
            }

            .nested-category-header:hover {
                color: var(--color-turquoise-dark);
                background-color: rgba(0, 130, 150, 0.05);
            }

            .nested-category-header .nested-arrow-icon {
                font-size: 9px;
                transition: transform var(--transition-speed) ease;
                color: var(--color-turquoise-medium);
            }

            .nested-category.expanded .nested-category-header .nested-arrow-icon {
                transform: rotate(90deg);
            }

            .nested-category-list {
                list-style: none;
                display: none;
                flex-direction: column;
                gap: 4px;
                padding-left: 14px;
                border-left: 1.5px dashed rgba(0, 130, 150, 0.12);
                margin-left: 6px;
            }

            .nested-category.expanded .nested-category-list {
                display: flex;
            }

            /* Sub-tabs bar styling */
            .sub-tabs-bar {
                display: flex;
                gap: 12px;
                background-color: var(--color-card-gray);
                padding: 10px 18px;
                border-radius: 16px;
                box-shadow: var(--shadow-raised-sm);
                width: 100%;
                overflow-x: auto;
                margin-bottom: 5px;
            }

            .sub-tab-btn {
                background: none;
                border: none;
                padding: 8px 15px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-medium);
                cursor: pointer;
                transition: all var(--transition-speed) ease;
                white-space: nowrap;
            }

            .sub-tab-btn:hover {
                color: var(--color-turquoise-dark);
                background-color: rgba(0, 130, 150, 0.06);
            }

            .sub-tab-btn.active {
                background-color: var(--color-bg-gray);
                color: var(--color-turquoise-dark);
                box-shadow: var(--shadow-sunken-sm);
            }

            /* Footer Utilities */
            .sidebar-footer {
                position: sticky;
                bottom: -35px; /* offset the sidebar's padding-bottom */
                background-color: #ffffff;
                padding-top: 5px;
                padding-bottom: 5px;
                margin-top: auto;
                z-index: 10;
                box-shadow: 0 -15px 15px -5px rgba(255, 255, 255, 0.95);
            }

            .footer-divider {
                border: none;
                height: 1.5px;
                background-color: rgba(0, 130, 150, 0.12);
                margin: 4px 0 8px 0;
            }

            .btn-footer-utility {
                width: 100%;
                background: none;
                border: none;
                padding: 10px 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
                cursor: pointer;
                border-radius: 12px;
                transition: all var(--transition-speed) ease;
                text-align: left;
            }

            .btn-footer-utility:hover:not(:disabled) {
                background-color: rgba(0, 130, 150, 0.05);
            }

            .btn-footer-utility:disabled {
                opacity: 0.45;
                cursor: not-allowed;
            }

            .utility-left {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .utility-right {
                font-size: 10.5px;
                font-weight: 500;
                color: var(--color-turquoise-medium);
                opacity: 0.85;
            }

            .check-icon {
                color: var(--color-turquoise-medium);
                font-size: 13px;
            }

            .dot-icon {
                color: var(--color-logo-red);
                font-size: 9px;
            }

            .dot-disabled {
                display: inline-block;
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background-color: #a0a0a0;
            }

            /* MAIN CONTENT */
            .main-content {
                flex: 1;
                margin-left: 280px;
                padding: 40px;
                display: flex;
                flex-direction: column;
                gap: 35px;
                box-sizing: border-box;
                max-width: calc(100% - 280px);
                min-width: 0;
                min-height: 100vh;
                transition:
                    margin-left var(--transition-speed) ease,
                    max-width var(--transition-speed) ease;
            }

            /* HEADER */
            .header-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
            }

            .header-title-area h1 {
                font-size: 24px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                margin-bottom: 5px;
            }

            .header-title-area p {
                font-size: 14px;
                color: var(--color-turquoise-dark);
                opacity: 0.8;
                font-weight: 500;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            /* Notifications */
            .notification-bell-container {
                position: relative;
            }

            .notification-bell {
                width: 48px;
                height: 48px;
                background-color: var(--color-bg-gray);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: var(--shadow-raised-sm);
                cursor: pointer;
                color: var(--color-turquoise-medium);
                transition: all var(--transition-speed) ease;
                position: relative;
            }

            .notification-bell:hover {
                box-shadow: var(--shadow-sunken-sm);
                color: var(--color-logo-red);
            }

            .notification-badge {
                position: absolute;
                top: 13px;
                right: 13px;
                width: 9px;
                height: 9px;
                background-color: var(--color-logo-red);
                border-radius: 50%;
                box-shadow: 0 0 8px var(--color-logo-red);
            }

            .notifications-dropdown {
                position: absolute;
                top: 60px;
                right: 0;
                width: 320px;
                background-color: var(--color-card-gray);
                border-radius: 20px;
                box-shadow:
                    8px 8px 24px var(--shadow-dark),
                    -8px -8px 24px var(--shadow-light);
                padding: 20px;
                display: none;
                flex-direction: column;
                gap: 15px;
                z-index: 200;
                transform-origin: top right;
                animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .notifications-dropdown.active {
                display: flex;
            }

            .dropdown-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                border-bottom: 1px solid rgba(2, 87, 99, 0.1);
                padding-bottom: 8px;
            }

            .dropdown-items {
                display: flex;
                flex-direction: column;
                gap: 10px;
                max-height: 250px;
                overflow-y: auto;
            }

            .dropdown-item {
                padding: 10px 12px;
                border-radius: 12px;
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-raised-sm);
                display: flex;
                gap: 10px;
                font-size: 12px;
                line-height: 1.4;
                cursor: pointer;
                transition: box-shadow var(--transition-speed) ease;
            }

            .dropdown-item:hover {
                box-shadow: var(--shadow-sunken-sm);
            }

            .dropdown-item i {
                color: var(--color-logo-red);
                margin-top: 2px;
            }

            .dropdown-item-content {
                flex: 1;
            }

            .dropdown-item-time {
                font-size: 10px;
                opacity: 0.6;
                margin-top: 4px;
                display: block;
            }

            /* Profile Card */
            .profile-card {
                padding: 8px 16px;
                border-radius: 16px;
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-raised-sm);
                display: flex;
                align-items: center;
                gap: 12px;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
            }

            .profile-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background-color: var(--color-turquoise-medium);
                color: #ffffff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                box-shadow: var(--shadow-raised-sm);
            }

            /* METRICS SECTION */
            .metrics-grid {
                display: none !important;
            }

            .metric-card {
                background-color: var(--color-card-gray);
                border-radius: 22px;
                padding: 22px;
                display: flex;
                flex-direction: column;
                gap: 12px;
                box-shadow: var(--shadow-raised);
                transition:
                    transform var(--transition-speed) ease,
                    box-shadow var(--transition-speed) ease;
                position: relative;
                overflow: hidden;
            }

            .metric-card:hover {
                transform: translateY(-4px);
            }

            .metric-card:active {
                box-shadow: var(--shadow-sunken);
                transform: translateY(0);
            }

            .metric-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .metric-title {
                font-size: 12px;
                font-weight: 700;
                color: var(--color-turquoise-dark);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                opacity: 0.8;
            }

            .metric-icon-wrapper {
                width: 40px;
                height: 40px;
                background-color: var(--color-bg-gray);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: var(--shadow-sunken-sm);
                color: var(--color-turquoise-medium);
                font-size: 16px;
            }

            .metric-value {
                font-size: 26px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                margin: 2px 0;
            }

            .metric-footer {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                font-weight: 500;
            }

            .trend-badge {
                display: flex;
                align-items: center;
                gap: 3px;
                font-weight: 700;
            }

            .trend-up {
                color: var(--color-turquoise-medium);
            }

            .trend-down {
                color: var(--color-logo-red);
            }

            /* FILTERS SECTION */
            .filter-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: var(--color-card-gray);
                padding: 15px 25px;
                border-radius: 20px;
                box-shadow: var(--shadow-raised);
            }

            .filter-info {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 14px;
                font-weight: 600;
            }

            .filter-info i {
                color: var(--color-turquoise-medium);
            }

            .filter-actions {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            /* Neumorphic Select */
            .select-wrapper {
                position: relative;
            }

            .select-neumorphic {
                appearance: none;
                background-color: #ffffff;
                color: var(--color-turquoise-medium);
                border: 1.5px solid rgba(90, 100, 110, 0.6);
                padding: 12px 45px 12px 20px;
                border-radius: 14px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                outline: none;
                transition: all var(--transition-speed) ease;
            }

            .select-neumorphic:focus {
                border-color: rgba(12, 100, 112, 0.4);
            }

            .select-wrapper::after {
                content: "\f107";
                font-family: "Font Awesome 6 Free";
                font-weight: 900;
                position: absolute;
                right: 20px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--color-turquoise-medium);
                pointer-events: none;
                transition: transform var(--transition-speed) ease;
            }

            /* CENTRAL SECTION (CHARTS & ACTION BUTTONS) */
            .charts-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 35px;
                width: 100%;
            }

            .charts-grid.two-columns {
                grid-template-columns: repeat(2, 1fr);
            }

            .chart-card {
                background-color: #ffffff;
                border: 1.5px solid rgba(90, 100, 110, 0.6);
                border-radius: 24px;
                padding: 30px;
                box-shadow: var(--shadow-raised);
                display: flex;
                flex-direction: column;
                gap: 25px;
                position: relative;
                min-width: 0;
            }

            .chart-card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .chart-card-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .chart-card-title i {
                color: var(--color-turquoise-dark);
            }

            .chart-canvas-wrapper {
                position: relative;
                width: 100%;
                height: 340px;
                min-width: 0;
                overflow: hidden;
            }

            /* BUTTONS */
            .btn-primary {
                background-color: var(--color-logo-red);
                color: #ffffff;
                border: none;
                padding: 12px 24px;
                border-radius: 16px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
                box-shadow:
                    4px 4px 10px rgba(200, 200, 200, 0.7),
                    -4px -4px 10px rgba(255, 255, 255, 0.9);
                transition: all var(--transition-speed) ease;
                outline: none;
            }

            .btn-primary:hover {
                background-color: #d61212;
                transform: translateY(-2px);
                box-shadow:
                    6px 6px 14px rgba(200, 200, 200, 0.8),
                    -6px -6px 14px rgba(255, 255, 255, 1);
            }

            .btn-primary:active {
                transform: translateY(0);
                box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.2);
            }

            /* DATA TABLES SECTION */
            .table-card {
                background-color: #ffffff;
                border: 1.5px solid rgba(90, 100, 110, 0.6);
                border-radius: 24px;
                padding: 30px;
                box-shadow: var(--shadow-raised);
                display: flex;
                flex-direction: column;
                gap: 20px;
                min-width: 0;
            }

            .table-card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .table-card-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .table-outer-container {
                width: 100%;
                overflow-x: auto;
                border-radius: 18px;
                background-color: #ffffff;
                border: 1.5px solid rgba(90, 100, 110, 0.6);
                padding: 12px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: center;
                font-size: 13px;
                color: var(--color-turquoise-dark);
            }

            #table-slide1 {
                min-width: 800px;
            }

            thead th {
                background-color: rgba(0, 130, 150, 0.06);
                color: var(--color-turquoise-medium);
                font-weight: 700;
                padding: 14px 10px;
                text-transform: uppercase;
                font-size: 11px;
                letter-spacing: 0.5px;
                position: sticky;
                top: 0;
            }

            thead th:first-child {
                border-radius: 12px 0 0 12px;

                    var(--color-bg-gray) 50%,
                    var(--color-card-gray) 75%

                background-size: 200% 100%;
                animation: shimmer 1.5s infinite linear;

            @keyframes shimmer {
                to {
                    background-position: -200% 0;

            /* TOAST NOTIFICATION */
            .toast-notification {
                position: fixed;
                bottom: 30px;
                right: 30px;
                background-color: var(--color-card-gray);
                border-left: 5px solid var(--color-logo-red);
                padding: 15px 25px;
                border-radius: 12px;

                display: flex;
                align-items: center;
                gap: 15px;
                z-index: 1000;
                transform: translateY(100px);
                opacity: 0;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

            .toast-notification.active {
                transform: translateY(0);

                font-size: 20px;

            /* ===== BOTÓN COLAPSAR / EXPANDIR NAVBAR ===== */
            .logo-container {
                justify-content: space-between;
                width: 100%;
            }
            .nav-toggle {
                flex-shrink: 0;
                width: 36px;
                height: 36px;
                border-radius: 11px;
                border: none;

            }
            .nav-toggle i {
                transition: transform var(--transition-speed) ease;
            }

            /* Transiciones suaves de ancho */
            .sidebar {
                transition:

                    width var(--transition-speed) ease,
                    padding var(--transition-speed) ease;
            }

            /* Estado colapsado: solo íconos */
            body.nav-collapsed .sidebar {
                width: 78px;
                padding: 35px 14px;
            }
            body.nav-collapsed .main-content {
                margin-left: 78px;

            function scaleDataForColombia(obj) {
                if (obj === null || obj === undefined) return obj;
                if (typeof obj === 'number') {
                    if (obj >= 2000 && obj <= 2030) return obj; // Keep years
                    return Math.round(obj * 0.65 * 100) / 100;
                }
                if (Array.isArray(obj)) {
                    return obj.map(item => scaleDataForColombia(item));
                }
                if (typeof obj === 'string') {
                    if (obj.endsWith('%')) return obj;
                    const cleaned = obj.replace(/,/g, '').replace('S/ ', '').trim();
                    if (cleaned !== '' && !isNaN(cleaned)) {
                        const numVal = Number(cleaned);
                        if (numVal >= 2000 && numVal <= 2030) return obj; // Year
                        const scaled = Math.round(numVal * 0.65);
                        const formatted = new Intl.NumberFormat("es-PE", { maximumFractionDigits: 0 }).format(scaled);
                        return obj.startsWith('S/ ') ? 'S/ ' + formatted : formatted;
                    }
                    return obj;
                }
                if (typeof obj === 'object') {
                    const newObj = {};
                    for (const key in obj) {
                        if (obj.hasOwnProperty(key)) {
                            if (key === 'headers' || key === 'categories' || key === 'months' || key === 'monthsWithData' || key === 'name' || key === 'title' || key === 'subtitle' || key === 'filter' || key === 'icon' || key === 'kind' || key === 'iframeUrl') {
                                newObj[key] = obj[key];
                            } else if (key === 'compliance' || key === 'rotation') {
                                newObj[key] = obj[key];
                            } else {
                                newObj[key] = scaleDataForColombia(obj[key]);
                            }
                        }
                    }
                    return newObj;
                }
                return obj;
            }

            function selectMenuSubItem(catKey, subCatKey) {
                currentCategory = catKey;
                currentSubCategory = subCatKey;

                // Deactivate all sub-btns
                document.querySelectorAll(".sub-btn").forEach(btn => btn.classList.remove("active"));
                
                // Activate clicked one(s) (handles duplicates in main and nested menus)
                const clickedBtns = document.querySelectorAll(`[onclick*="'${subCatKey}'"]`);
                clickedBtns.forEach(clickedBtn => {
                    clickedBtn.classList.add("active");
                    // Expand parent nested category if button is inside one
                    const parentNested = clickedBtn.closest(".nested-category");
                    if (parentNested) {
                        parentNested.classList.add("expanded");
                    }
                });

                // Get corresponding slides
                const mapping = SUBCAT_MAPPING[subCatKey];
                if (mapping && mapping.slides.length > 0) {
                    selectSlide(mapping.slides[0]);
                    renderSubTabs(subCatKey);
                } else {
                    // Placeholder views (Planeamiento, Créditos, Tesorería, Usuarios, Roles)
                    showPlaceholderView(subCatKey);
                }
            }

                if (!mapping || mapping.slides.length <= 1) {
                    container.style.display = "none";
                    return;

                container.style.display = "flex";
                container.innerHTML = mapping.slides.map(slideId => {
                    const slide = SLIDES.find(s => s.id === slideId);
                    if (!slide) return '';
                    const activeClass = (activeSlide === slideId) ? 'active' : '';
                    return `<button class="sub-tab-btn ${activeClass}" onclick="selectSubTab('${slideId}', '${subCatKey}')">${slide.label}</button>`;
                }).join('');
            }

            function cloneAndScaleSeguimientoTable(table, factor) {
                const scaledRows = table.rows.map((row) => {
                    const label = row[0];
                    if (label === "% Crec") return row.slice();
                    const scaled = row.slice(1).map((cell) => {
                        const v = num(cell);
                        if (!v) return cell;
                        return new Intl.NumberFormat("es-PE", {
                            maximumFractionDigits: 0,
                        }).format(Math.round(v * factor));
                    });
                    return [label, ...scaled];
                });
                return { headers: table.headers.slice(), rows: scaledRows };
            }

            function populateSeguimientoSelectors() {
                ensureSeguimientoPeopleData();
                const d = dashboardData.slide9;
                if (!d || !d.peopleByRole) return;
                const roleSel = document.getElementById("f-seg-role");
                const personSel = document.getElementById("f-supervisor");
                if (!roleSel || !personSel) return;

                const role =
                    roleSel.value || slide1Filters.segRole || "supervisor";
                slide1Filters.segRole = role;
                const people = d.peopleByRole[role] || {};
                const keys = Object.keys(people);
                if (!keys.length) return;

                if (!people[slide1Filters.supervisor])
                    slide1Filters.supervisor = keys[0];
                personSel.innerHTML = keys
                    .map(
                        (k) =>
                            `<option value="${k}">${people[k].name}</option>`,
                    )
                    .join("");
                personSel.value = slide1Filters.supervisor;
                const label = document.querySelector("#group-supervisor label");
                if (label)
                    label.innerHTML = `<i class="fa-solid fa-user-tie"></i> Persona`;
            }

            function renderView() {
                updateYearOptions(activeSlide);
                updatePeriodOptions(activeSlide);

                const currentSlide = SLIDES.find((s) => s.id === activeSlide);
                const isIframe = currentSlide && currentSlide.kind === "iframe";

            // ---- COMPARATIVO VENTA DIARIA (s29) ----
            function renderComparativoDiario(slide, host) {
                const role     = slide1Filters.segRole  || "subgerente";
                const personKey = slide1Filters.supervisor || "default";

                // Seedable LCG – unique per role+person combo
                const strHash = (str) => {
                    let h = 5381;
                    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
                    return h >>> 0;
                };
                const baseSeed = strHash(role + "|" + personKey);
                const rand = (extra) => {
                    let s = (baseSeed + extra * 1000003) >>> 0;
                    return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
                };

                // Subordinate entity sets per role — varied per persona
                const subordinatesByRole = {
                    gerencia: {
                        default:     ["Subgerencia Lima Norte","Subgerencia Lima Sur","Subgerencia Lima Este","Subgerencia Lima Centro","Subgerencia Provincias Norte","Subgerencia Provincias Sur"],
                        alfaro:      ["Subgerencia Lima Norte","Subgerencia Lima Sur","Subgerencia Lima Centro","Subgerencia La Molina","Subgerencia San Borja"],
                        paredes:     ["Subgerencia Miraflores","Subgerencia San Isidro","Subgerencia Barranco","Subgerencia Chorrillos","Subgerencia Surco"],
                        cuenca:      ["Subgerencia Breña","Subgerencia Lince","Subgerencia Jesús María","Subgerencia Pueblo Libre","Subgerencia San Miguel","Subgerencia Magdalena"],
                        gomez:       ["Subgerencia Ate","Subgerencia San Juan de Lurigancho","Subgerencia Villa El Salvador","Subgerencia Comas","Subgerencia Los Olivos"],
                        diaz:        ["Subgerencia Arequipa","Subgerencia Trujillo","Subgerencia Piura","Subgerencia Chiclayo","Subgerencia Cusco","Subgerencia Iquitos"],
                    },
                    subgerente: {
                        default:     ["Supervisor A","Supervisor B","Supervisor C","Supervisor D","Supervisor E"],
                        alfaro:      ["Sup. Bermejo","Sup. Bustos","Sup. Jaramillo","Sup. Meza","Sup. Vallejos","Sup. Martínez"],
                        paredes:     ["Sup. Salvador","Sup. Toalino","Sup. Bello","Sup. Calderón","Sup. Plaza"],
                        cuenca:      ["Sup. Olivares","Sup. Ramos","Sup. Torres","Sup. García","Sup. López","Sup. Flores"],
                        gomez:       ["Sup. Rodríguez","Sup. Hernández","Sup. Díaz","Sup. Morales","Sup. Vásquez"],
                        diaz:        ["Sup. Castillo","Sup. Reyes","Sup. Cruz","Sup. Núñez","Sup. Quispe","Sup. Mamani"],
                    },
                    supervisor: {
                        default:     ["Vend. 1","Vend. 2","Vend. 3","Vend. 4","Vend. 5","Vend. 6","Vend. 7"],
                        alfaro:      ["Bermejo M.","Bustos F.","Jaramillo B.","Meza S.","Vallejos L.","Martínez D.","Salvador M."],
                        paredes:     ["Toalino C.","Bello M.","Calderón O.","Plaza F.","Olivares Z.","Quispe R.","Flores A."],
                        cuenca:      ["Ramos J.","Torres E.","García P.","López N.","Núñez C.","Herrera G."],
                        gomez:       ["Rodríguez K.","Hernández L.","Díaz M.","Morales T.","Vásquez S.","Castro R.","Mendoza F."],
                        diaz:        ["Castillo A.","Reyes B.","Cruz C.","Núñez D.","Quispe E.","Mamani F."],
                    }
                };

                // Sales intensity per role (daily range)
                const salesRange = { gerencia: [25, 80], subgerente: [8, 30], supervisor: [1, 12] };
                const [minS, maxS] = salesRange[role] || salesRange.subgerente;

                // Pick entity list: try personKey substring match
                const roleEntities = subordinatesByRole[role] || subordinatesByRole.subgerente;
                let entities = roleEntities.default;
                const pk = personKey.toLowerCase();
                for (const key of Object.keys(roleEntities)) {
                    if (pk.includes(key) || key.includes(pk.split(" ")[0])) {
                        entities = roleEntities[key];
                        break;
                    }
                }

                // Display name for selected person
                const d9 = dashboardData.slide9;
                let personName = personKey;
                if (d9 && d9.peopleByRole && d9.peopleByRole[role] && d9.peopleByRole[role][personKey]) {
                    personName = d9.peopleByRole[role][personKey].name || personKey;
                }

                const months      = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Setiembre","Octubre","Noviembre","Diciembre"];
                const daysInMonth = [31,28,31,30,31,30,31,31,30,31,30,31];
                const maxDays     = 30;

                let grandTotal = 0;
                const monthTotals = [];

                const dayHeaders = Array.from({length: maxDays}, (_, i) => `<th>D${i+1}</th>`).join("");

                let tbHtml = "";
                months.forEach((month, mIdx) => {
                    const days = Math.min(daysInMonth[mIdx], maxDays);
                    let monthTotal = 0;

                    tbHtml += `<tr class="row-month-header"><td colspan="${maxDays + 2}">${month}</td></tr>`;

                    entities.forEach((entity, eIdx) => {
                        const rng = rand(mIdx * 500 + eIdx * 37);
                        let rowTotal = 0;
                        let cells = "";
                        for (let d = 0; d < maxDays; d++) {
                            if (d < days) {
                                const val = Math.floor(rng() * (maxS - minS + 1)) + minS;
                                rowTotal += val;
                                cells += `<td>${val}</td>`;
                            } else {
                                cells += `<td style="color:#ccc">—</td>`;

                        }
                        monthTotal += rowTotal;
                        tbHtml += `<tr><td class="comp-entity-cell">${entity}</td>${cells}<td class="comp-total-cell">${nf(rowTotal)}</td></tr>`;
                    });

                    grandTotal += monthTotal;
                    monthTotals.push(monthTotal);
                    const subCells = Array.from({length: maxDays}, () => `<td></td>`).join("");
                    tbHtml += `<tr class="row-total row-month-total"><td style="text-align:left;padding-left:20px">Total ${month}</td>${subCells}<td>${nf(monthTotal)}</td></tr>`;

                const m0 = monthTotals[0] || 0;

                    { title: "Total Acumulado",          value: nf(grandTotal), icon: "fa-chart-line",     trendText: "Todos los meses",   trendUp: true,  accentColor: "#E0A458" },
                    { title: roleLabel,                  value: personName.split(" ").slice(0,2).join(" "), icon: "fa-user-tie", trendText: `${entities.length} entidades`, trendUp: true, accentColor: "#2A9D8F" }
                ]);

                host.innerHTML = `
        <section class="table-card">
          <div class="table-card-header">
            <h3 class="table-card-title"><i class="fa-solid fa-calendar-day"></i>
              <span>Comparativo Venta Diaria — ${roleLabel}: ${personName}</span>
            </h3>
          </div>
          <div class="seg-table-wrapper" style="overflow: auto; max-height: 560px;">
            <table class="seg-table" style="font-size: 11px; min-width: max-content;">
              <thead>

                  ${dayHeaders}

                </tr>

        <style>

            border-left: 2px solid rgba(14,140,155,0.25);
            position: sticky; right: 0; background: rgba(240,251,252,0.97);
          }
        </style>
      `;
            }

            // ---- REPORT GERENCIAL (slide 10) ----
            function cloneAndScaleReporteGerencialTable(table, factor) {
                const scaledVariables = table.variables.map((variable) => {
                    const name = variable.name;
                    // Don't scale percentages, averages, or decimals
                    if (
                        name.includes("%") ||
                        name === "Productividad" ||
                        name === "CIC Promedio"
                    ) {
                        return { name, values: variable.values.slice() };
                    }
                    const scaledVals = variable.values.map((val) => {
                        if (val == null) return null;
                        if (typeof val === "string") {
                            const numVal =
                                parseFloat(val.replace(/[k$,]/g, "")) *
                                (val.includes("k") ? 1000 : 1);
                            const scaled = Math.round(numVal * factor);
                            return scaled >= 1000
                                ? (scaled / 1000).toFixed(1) + "k"
                                : scaled;
                        }
                        return Math.round(val * factor);
                    });
                    return { name, values: scaledVals };
                });
                return {
                    months: table.months.slice(),
                    variables: scaledVariables,
                };
            }

            function renderCuotaInscripcion(slide, host) {
                ensureSlide11PeopleData();
                const d = dashboardData.slide11;
                const role = slide1Filters.segRole || "supervisor";
                const rolePeople = d.peopleByRole[role] || {};
                const supKey =
                    slide1Filters.supervisor || Object.keys(rolePeople)[0];
                const sup = rolePeople[supKey];
                if (!sup) {
                    renderImage(slide, host);
                    return;
                }

                const fee = sup.feeDistribution;
                const orig = sup.originSales;

                // Select specific month filter
                const monthIdx = Math.min(
                    slide1Filters.from || 0,
                    orig.months.length - 1,
                );
                const selectedMonthName = orig.months[monthIdx];

                // Calculate month factor relative to January (index 0) to dynamically scale the fee distribution table
                const getMonthSalesTotal = (mIdx) =>
                    orig.categories.reduce(
                        (sum, cat) =>
                            sum +
                            ((orig.series[cat] && orig.series[cat][mIdx]) || 0),
                        0,
                    );
                const janTotal = getMonthSalesTotal(0);
                const activeMonthTotal = getMonthSalesTotal(monthIdx);
                const monthFactor = janTotal
                    ? activeMonthTotal / janTotal
                    : 1.0;

                // Scale the fee distribution table dynamically for the selected month
                const scaleFeeTableForMonth = (feeTable, factor) => {
                    const scaledRows = feeTable.rows.map((row) => {
                        const name = row[0];
                        const vals = row
                            .slice(1, -1)
                            .map((v) =>
                                v === ""
                                    ? ""
                                    : String(
                                          Math.max(
                                              1,
                                              Math.round(num(v) * factor),
                                          ),
                                      ),
                            );
                        const rowSum = vals.reduce(
                            (sum, v) => sum + (num(v) || 0),
                            0,
                        );
                        return [name, ...vals, String(rowSum)];
                    });
                    const colTotals = ["Total general"];
                    for (let col = 1; col <= 5; col++) {
                        let colSum = scaledRows.reduce(
                            (sum, r) => sum + (num(r[col]) || 0),
                            0,
                        );

                    }
                    colTotals.push(
                        String(
                            colTotals
                                .slice(1)
                                .reduce((sum, v) => sum + num(v), 0),
                        ),
                    );
                    return {
                        headers: feeTable.headers.slice(),
                        rows: scaledRows,
                        totals: colTotals,
                    };
                };

                const monthlyFee = scaleFeeTableForMonth(fee, monthFactor);

                // Calculate totals for metric cards based on the selected month
                const totalEnrollments = num(
                    monthlyFee.totals[monthlyFee.totals.length - 1],
                );
                const totalLeadsSales = orig.series["Leads"]

                    : 0;

                    : 0;

                renderMetricCards([

                    .join("");
                let tb1 = monthlyFee.rows
                    .map((row) => {
                        const isZero = row[row.length - 1] === "0";
                        const style = isZero ? ' style="opacity: 0.5;"' : "";

                                    : `<td>${c || "—"}</td>`,

                        return `<tr${style}>${cells}</tr>`;
                    })

                tb1 += `<tr class="row-total">${monthlyFee.totals.map((c, i) => (i === 0 ? `<td style="text-align: left; padding-left: 15px;">${c}</td>` : `<td>${c || "—"}</td>`)).join("")}</tr>`;

                // Build Table 2
                const th2 = ["Origen de la Venta", ...orig.months, "Total"]
                    .map((h) => `<th>${h}</th>`)
                    .join("");

                let tb2 = "";
                const monthlyTotals = new Array(orig.months.length).fill(0);
                let cumulativeGrandTotal = 0;

                orig.categories.forEach((cat) => {
                    const rowVals = orig.series[cat] || [];
                    const rowSum = rowVals.reduce(
                        (sum, v) => sum + (v || 0),
                        0,
                    );
                    cumulativeGrandTotal += rowSum;

                        .map((v, i) => {
                            monthlyTotals[i] += v || 0;
                            return `<td>${v == null ? "—" : nf(v)}</td>`;

                    tb2 += `<tr><td style="text-align: left; padding-left: 15px;"><strong>${cat}</strong></td>${cells}<td><strong>${nf(rowSum)}</strong></td></tr>`;
                });
                tb2 +=

                    monthlyTotals

                    `<td>${nf(cumulativeGrandTotal)}</td></tr>`;

                host.innerHTML = `

                    .reduce((sum, r) => sum + r[r.length - 1], 0);

                    rows.find((r) => r[0] === "Ninguno")

                // Build Table
                const thHtml = headers.map((h) => `<th>${h}</th>`).join("");
                let tbHtml = rows
                    .filter((row) =>
                        selectedMall === "all" ? true : row[0] === selectedMall,
                    )
                    .map((row) => {
                        const isNone = row[0] === "Ninguno";
                        const rowCls = isNone
                            ? ' class="row-none-highlight"'
                            : "";
                        const cells = row
                            .map((c, i) => {
                                if (i === 0)
                                    return `<td style="text-align: left; padding-left: 15px;"><strong>${c}</strong></td>`;

            function renderSalesTable(isMonto) {
                const data = dashboardData.slide1;

                    .map(Number)
                    .sort((a, b) => a - b);

                        maximumFractionDigits: 0,

                    avgRow = [];

                    const vals = serie.filter((v) => v != null);

                    totalRow.push({ y, v: total });
                    avgRow.push({ y, v: Math.round(avg) });

                let body = `<tbody><tr><td class="row-label-total"><i class="fa-solid fa-coins"></i> TOTAL</td>`;

            // ============ RENDER COMPLETO DEL SLIDE 1 (según filtros) ============
            function renderSlide1() {
                const data = dashboardData.slide1;
                const { metric, year, from, to } = slide1Filters;
                const isMonto = metric === "monto";
                const months = data.months;

                const cur = data.years[year] || {};
                const prev = data.years[year - 1] || {};

                const curSeries = isMonto ? cur.monto : cur.cantidad;
                const prevSeries = isMonto ? prev.monto : prev.cantidad;
                const presSeries = isMonto
                    ? cur.presupuestoMonto
                    : cur.presupuesto;

                // Recorte por periodo (desde - hasta)
                const labels = months.slice(from, to + 1);
                const curVals = (curSeries || []).slice(from, to + 1);
                const prevVals = (prevSeries || []).slice(from, to + 1);
                const presVals = (presSeries || []).slice(from, to + 1);

                // Título y subtítulo
                const fromName = MONTH_NAMES[from],
                    toName = MONTH_NAMES[to];
                const periodTxt =
                    from === to ? fromName : `${fromName} – ${toName}`;
                document.getElementById("dashboard-title").textContent =
                    `${data.title}: ${periodTxt} ${year}`;
                document.getElementById("dashboard-subtitle").textContent =
                    `Métrica: ${isMonto ? "Monto (S/.)" : "Cantidad de ventas"} · Comparativo ${year} vs ${year - 1} vs Presupuesto`;
                document.getElementById("slide1-chart-title").textContent =
                    `${isMonto ? "Monto" : "Cantidad"} de ventas (${year} vs ${year - 1} vs Presupuesto)`;

                // Métricas (KPIs) calculadas sobre el periodo seleccionado
                renderSlide1Metrics(curVals, presVals, prevVals, isMonto, year);

                // Gráfico y tabla
                initChartSlide1({
                    labels,
                    curVals,
                    prevVals,
                    presVals,
                    year,
                    isMonto,
                });
                renderSlide1Legend(year);
                renderTableSlide1(isMonto);
            }

            // KPIs del slide 1
            function renderSlide1Metrics(
                curVals,
                presVals,
                prevVals,
                isMonto,
                year,
            ) {
                const sum = (arr) => arr.reduce((a, v) => a + (v || 0), 0);
                const count = (arr) => arr.filter((v) => v != null).length;

                const totalCur = sum(curVals);
                const nMonths = count(curVals) || 1;
                const avgCur = totalCur / nMonths;
                const totalPres = sum(presVals);
                const totalPrev = sum(prevVals);
                const compliance = totalPres ? (totalCur / totalPres) * 100 : 0;
                const yoy = totalPrev
                    ? ((totalCur - totalPrev) / totalPrev) * 100
                    : 0;

                const fmt = (v) =>
                    isMonto
                        ? "S/ " +
                          new Intl.NumberFormat("es-PE", {
                              maximumFractionDigits: 0,
                          }).format(v)
                        : new Intl.NumberFormat("es-PE", {
                              maximumFractionDigits: 0,
                          }).format(v);

                const cards = [
                    {
                        title: `Ventas Totales ${year}`,
                        value: fmt(totalCur),
                        icon: "fa-solid fa-cart-shopping",
                        trendText: `${yoy >= 0 ? "+" : ""}${yoy.toFixed(1)}% vs ${year - 1}`,
                        trendUp: yoy >= 0,
                        accentColor: "#0E8C9B",
                    },
                    {
                        title: "Promedio Mensual",
                        value: fmt(Math.round(avgCur)),
                        icon: "fa-solid fa-calculator",
                        trendText: `${nMonths} mes(es) con data`,
                        trendUp: true,
                        accentColor: "#3A7CA5",
                    },
                    {
                        title: "Meta Acumulada",
                        value: fmt(totalPres),
                        icon: "fa-solid fa-bullseye",
                        trendText: "Presupuesto del periodo",
                        trendUp: true,
                        accentColor: "#E0A458",
                    },
                    {
                        title: "Cumplimiento",
                        value: compliance.toFixed(1) + "%",
                        icon: "fa-solid fa-percentage",
                        trendText: `${compliance >= 100 ? "+" : ""}${(compliance - 100).toFixed(1)}% vs meta`,
                        trendUp: compliance >= 100,
                        accentColor: "#E2674F",
                    },
                ];
                renderMetricCards(cards);
            }

                                grid: { color: "rgba(200, 200, 200, 0.2)" },
                                ticks: {
                                    font: { family: "Inter" },
                                    color: "#025763",
                                },
                            },
                        },
                    },
                });

                // 2. Monthly comparison chart (Ventas as Bars vs Presupuesto as Line)
                const ctxMonthly = document
                    .getElementById("chart-slide2-monthly")
                    .getContext("2d");
                chartInstanceSlide2Monthly = new Chart(ctxMonthly, {
                    type: "bar",
                    data: {
                        labels: monthlyData.categories,
                        datasets: [
                            {
                                type: "bar",
                                label: "Ventas Reales",
                                data: monthlyData.series[0].values,
                                backgroundColor: "#457B9D", // Slate Blue for actual sales
                                hoverBackgroundColor: "#315972",
                                borderRadius: 6,
                                barThickness: 14,
                            },
                            {
                                type: "line",
                                label: "Presupuesto Asignado",
                                data: monthlyData.series[1].values,
                                borderColor: "#E76F51", // Coral line for budget
                                borderWidth: 3,
                                borderDash: [5, 5],
                                pointBackgroundColor: "#E76F51",
                                pointRadius: 4,
                                fill: false,
                                tension: 0.2,
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: "top",
                                labels: {
                                    font: { family: "Inter", weight: "600" },
                                    color: "#025763",
                                },
                            },
                            tooltip: {
                                backgroundColor: "#F5F5F5",
                                titleColor: "#025763",
                                bodyColor: "#008296",
                                bodyFont: { family: "Inter", weight: "600" },
                                titleFont: { family: "Inter", weight: "700" },
                                padding: 12,
                            },
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: {
                                    font: { family: "Inter", weight: "500" },
                                    color: "#025763",
                                },
                            },
                            y: {
                                grid: { color: "rgba(200, 200, 200, 0.2)" },
                                ticks: {
                                    font: { family: "Inter" },
                                    color: "#025763",
                                },
                            },
                        },
                    },
                });
            }

            // TABLE GENERATION - SLIDE 1 (Resumen anual: Total y Promedio por año)
            function renderTableSlide1(isMonto) {
                const data = dashboardData.slide1;
                const table = document.getElementById("table-slide1");
                const thead = table.querySelector("thead");
                const tbody = table.querySelector("tbody");

                const years = Object.keys(data.years)
                    .map(Number)
                    .sort((a, b) => a - b);
                const fmt = (v) =>
                    new Intl.NumberFormat("es-PE", {
                        maximumFractionDigits: 0,
                    }).format(v);
                const sel = slide1Filters.year;

                // Cabecera
                let head = "<tr><th>AÑO</th>";
                years.forEach((y) => {
                    head += `<th class="${y === sel ? "col-selected" : ""}">${y}</th>`;
                });
                thead.innerHTML = head + "</tr>";

                // Calcular total y promedio por año según métrica
                const totalRow = [],
                    avgRow = [];
                years.forEach((y) => {
                    const serie =
                        (isMonto
                            ? data.years[y].monto
                            : data.years[y].cantidad) || [];
                    const vals = serie.filter((v) => v != null);
                    const total = vals.reduce((a, v) => a + v, 0);
                    const avg = vals.length ? total / vals.length : 0;
                    totalRow.push({ y, v: total });
                    avgRow.push({ y, v: Math.round(avg) });
                });

                const pref = isMonto ? "S/ " : "";
                let body = `<tr><td class="row-label-total"><i class="fa-solid fa-coins"></i> TOTAL</td>`;
                totalRow.forEach(
                    (c) =>
                        (body += `<td class="${c.y === sel ? "col-selected" : ""}">${pref}${fmt(c.v)}</td>`),
                );
                body += `</tr><tr><td class="row-label-avg"><i class="fa-solid fa-chart-simple"></i> PROMEDIO</td>`;
                avgRow.forEach(
                    (c) =>
                        (body += `<td class="${c.y === sel ? "col-selected" : ""}">${pref}${fmt(c.v)}</td>`),
                );
                body += "</tr>";
                tbody.innerHTML = body;
            }

            // TABLE GENERATION - SLIDE 2 (13 months rows)
            function renderTableSlide2(tableData) {
                const tbody = document
                    .getElementById("table-slide2")
                    .querySelector("tbody");
                tbody.innerHTML = "";

                tableData.months.forEach((month, index) => {
                    const venta = tableData.ventas[index];
                    const pres = tableData.presupuesto[index];

                    // Calculate compliance %
                    const pct = (venta / pres) * 100;
                    const pctFormatted = pct.toFixed(1) + "%";
                    const isGood = pct >= 100;

                    const complianceClass = isGood
                        ? "compliance-high"
                        : "compliance-low";
                    const statusBadge = isGood
                        ? `<span class="compliance-high"><i class="fa-solid fa-circle-check"></i> Meta Alcanzada</span>`
                        : `<span class="compliance-low"><i class="fa-solid fa-circle-exclamation"></i> En Desviación</span>`;

                    const rowHtml = `
          <tr>
            <td style="text-align: left; padding-left: 20px;"><strong>${month}</strong></td>
            <td>${venta.toFixed(1)}</td>
            <td>${pres.toFixed(1)}</td>
            <td class="${complianceClass}">${pctFormatted}</td>
            <td>${statusBadge}</td>
          </tr>
        `;
                    tbody.innerHTML += rowHtml;
                });
            }

            // FILTERS APPLICATOR (SIMULATION)
            function applyFilter(filterVal) {
                showToast(
                    "Actualizando Segmento",
                    `Cargando datos del canal para: ${filterVal.toUpperCase()}`,
                );

                const tableOuter = document.querySelector(
                    "#view-slide2 .table-outer-container",
                );
                const chartCards = document.querySelectorAll(
                    "#view-slide2 .chart-card",
                );

                // Show visual loading shimmer class
                tableOuter.classList.add("shimmer-bg");
                chartCards.forEach((c) => c.classList.add("shimmer-bg"));

                setTimeout(() => {
                    tableOuter.classList.remove("shimmer-bg");
                    chartCards.forEach((c) => c.classList.remove("shimmer-bg"));

                    // Generate simulated variations of Slide 2 data based on filter
                    const multiplier =
                        filterVal === "lima"
                            ? 0.75
                            : filterVal === "provincia"
                              ? 0.25
                              : 1.0;
                    const originalData = dashboardData.slide2;

                    const filteredAnnual = {
                        categories: originalData.chartAnnual.categories,
                        values: originalData.chartAnnual.values.map((v) =>
                            Number((v * multiplier).toFixed(1)),
                        ),
                        name: originalData.chartAnnual.name,
                    };

                    const filteredMonthly = {
                        categories: originalData.chartMonthly.categories,
                        series: [
                            {
                                name: originalData.chartMonthly.series[0].name,
                                values: originalData.chartMonthly.series[0].values.map(
                                    (v) => Number((v * multiplier).toFixed(1)),
                                ),
                            },
                            {
                                name: originalData.chartMonthly.series[1].name,
                                values: originalData.chartMonthly.series[1].values.map(
                                    (v) => Number((v * multiplier).toFixed(1)),
                                ),
                            },
                        ],
                    };

                    const filteredTable = {
                        months: originalData.table.months,
                        ventas: originalData.table.ventas.map(
                            (v) => v * multiplier,
                        ),
                        presupuesto: originalData.table.presupuesto.map(
                            (v) => v * multiplier,
                        ),
                    };

                    // Redraw with filtered data
                    initChartsSlide2(filteredAnnual, filteredMonthly);
                    renderTableSlide2(filteredTable);

                    // Update the metric card totals for Slide 2
                    const metricsContainer =
                        document.getElementById("metrics-container");
                    metricsContainer.innerHTML = "";

                    const avg2026 = (270.7 * multiplier).toFixed(1);
                    const lastVenta = (215 * multiplier).toFixed(1);
                    const lastPres = (258.3 * multiplier).toFixed(1);
                    const complianceVal = (
                        (lastVenta / lastPres) *
                        100
                    ).toFixed(1);
                    const trendUp = complianceVal >= 100;

                    const cardsData = [
                        {
                            title: `Promedio Anual (${filterVal.toUpperCase()})`,
                            value: avg2026,
                            icon: "fa-solid fa-calendar-days",
                            trendText: `Promedio del canal`,
                            trendUp: true,
                            accentColor: "#025763",
                        },
                        {
                            title: "Ventas Mar 26",
                            value: lastVenta,
                            icon: "fa-solid fa-shop",
                            trendText: "Venta real canal",
                            trendUp: trendUp,
                            accentColor: "#457B9D",
                        },
                        {
                            title: "Presupuesto Mar 26",
                            value: lastPres,
                            icon: "fa-solid fa-chart-line",
                            trendText: "Presupuesto canal",
                            trendUp: true,
                            accentColor: "#D97706",
                        },
                        {
                            title: "Cumplimiento Canal",
                            value: `${complianceVal}%`,
                            icon: "fa-solid fa-check-double",
                            trendText: trendUp
                                ? "Meta cumplida"
                                : "Por debajo de meta",
                            trendUp: trendUp,
                            accentColor: "#7B2CBF",
                        },
                    ];

                    cardsData.forEach((card) => {
                        const trendClass = card.trendUp
                            ? "trend-up"
                            : "trend-down";
                        const trendIcon = card.trendUp
                            ? "fa-arrow-trend-up"
                            : "fa-arrow-trend-down";

                        const cardHtml = `
            <div class="metric-card">
              <div class="metric-header">
                <span class="metric-title">${card.title}</span>
                <div class="metric-icon-wrapper" style="color: ${card.accentColor};">
                  <i class="${card.icon}"></i>
                </div>
              </div>
              <div class="metric-value" style="color: ${card.accentColor};">${card.value}</div>
              <div class="metric-footer">
                <span class="trend-badge ${trendClass}">
                  <i class="fa-solid ${trendIcon}"></i>
                  <span>${card.trendText}</span>
                </span>
              </div>
            </div>
          `;
                        metricsContainer.innerHTML += cardHtml;
                    });
                }, 550);
            }

            // COLAPSAR / EXPANDIR LA BARRA LATERAL
            function toggleSidebar() {
                document.body.classList.toggle("nav-collapsed");
                // Reajustar los gráficos tras la animación de ancho
                setTimeout(() => {
                    [
                        chartInstanceSlide1,
                        chartInstanceSlide2Annual,
                        chartInstanceSlide2Monthly,
                    ].forEach((c) => {
                        if (c) c.resize();
                    });
                    // Redimensionar también los gráficos dinámicos de otras pestañas
                    Object.values(dynCharts).forEach((c) => {
                        if (c) c.resize();
                    });
                }, 320);
            }

            // INTERACTIVE TOAST
            function showToast(title, description) {
                const toast = document.getElementById("toast-notify");
                document.getElementById("toast-title").textContent = title;
                document.getElementById("toast-desc").textContent = description;

                toast.classList.add("active");

                setTimeout(() => {
                    toast.classList.remove("active");
                }, 3500);
            }

            // NOTIFICATIONS PANEL INTERACTION (Removed from UI)
            function toggleNotifications() {
                const dropdown = document.getElementById(
                    "dropdown-notifications",
                );
                if (dropdown) dropdown.classList.toggle("active");
            }

            // Close notifications if clicking outside
            document.addEventListener("click", (e) => {
                const dropdown = document.getElementById(
                    "dropdown-notifications",
                );
                const bell = document.querySelector(".notification-bell");
                if (
                    dropdown &&
                    bell &&
                    !dropdown.contains(e.target) &&
                    !bell.contains(e.target)
                ) {
                    dropdown.classList.remove("active");
                }
            });

            function clearNotifications() {
                const list = document.getElementById("notification-list");
                const badge = document.getElementById("alert-badge");
                if (list) {
                    list.innerHTML = `
          <div style="padding: 20px; text-align: center; font-size: 13px; color: var(--color-turquoise-dark); opacity: 0.6;">
            <i class="fa-solid fa-envelope-open" style="font-size: 20px; margin-bottom: 8px; display: block; color: var(--color-turquoise-medium);"></i>
            No tienes notificaciones pendientes.
          </div>
        `;
                }
                if (badge) badge.style.display = "none";
                showToast(
                    "Bandeja de Entrada limpia",
                    "Todas las alertas corporativas marcadas como leídas.",
                );
            }
        </script>
    </body>
</html>
