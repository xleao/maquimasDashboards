<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Maqui - Enterprise BI Portal</title>
        <!-- Google Fonts: Inter -->
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <!-- FontAwesome Icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <!-- Chart.js CDN -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <!-- Plugin de etiquetas de datos -->
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

        <style>
            /* VARIABLES DE DISEÑO (PALETA DE COLORES Y NEUMORFISMO) */
            :root {
                --color-logo-red: #f01515;
                --color-turquoise-medium: #008296;
                --color-turquoise-dark: #025763;
                --color-bg-gray: #f0f0f0; /* Plomo muy claro para botones */
                --color-card-gray: #f7f7f7; /* Plomo muy claro para tarjetas */

                /* Sombras suaves (blanco atenuado para evitar el "resplandor") */
                --shadow-light: rgba(255, 255, 255, 0.6);
                --shadow-dark: rgba(0, 0, 0, 0.09);

                --shadow-raised:
                    5px 5px 12px var(--shadow-dark),
                    -4px -4px 10px var(--shadow-light);
                --shadow-raised-sm:
                    3px 3px 7px var(--shadow-dark),
                    -2px -2px 6px var(--shadow-light);
                --shadow-sunken:
                    inset 4px 4px 9px var(--shadow-dark),
                    inset -3px -3px 7px var(--shadow-light);
                --shadow-sunken-sm:
                    inset 2px 2px 5px var(--shadow-dark),
                    inset -2px -2px 4px var(--shadow-light);

                --transition-speed: 0.3s;
            }

            /* RESET & BASE STYLES */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: #ffffff;
                font-family: "Inter", sans-serif;
                color: var(--color-turquoise-dark);
                display: flex;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* NAV / SIDEBAR */
            .sidebar {
                width: 280px;
                background-color: #ffffff;
                box-shadow:
                    8px 0 24px var(--shadow-dark),
                    -8px 0 24px var(--shadow-light);
                border-radius: 0 24px 24px 0;
                padding: 35px 25px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                z-index: 100;
                transition: transform var(--transition-speed) ease;
            }

            .sidebar-top {
                display: flex;
                flex-direction: column;
                gap: 40px;
            }

            /* Logo Area */
            .logo-container {
                display: flex;
                align-items: center;
                gap: 12px;
                padding-left: 10px;
            }

            .logo-img {
                height: 52px;
                width: auto;
                max-width: 100%;
                object-fit: contain;
                filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.1));
            }

            .logo-icon {
                font-size: 26px;
                color: var(--color-turquoise-medium);
                filter: drop-shadow(2px 2px 4px var(--shadow-dark));
            }

            .logo-text {
                font-size: 20px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                letter-spacing: -0.5px;
            }

            /* Navigation Links */
            .nav-list {
                display: flex;
                flex-direction: column;
                gap: 20px;
                list-style: none;
            }

            .nav-item {
                width: 100%;
            }

            .nav-btn {
                width: 100%;
                background-color: var(--color-bg-gray);
                color: var(--color-turquoise-medium);
                border: none;
                padding: 16px 20px;
                border-radius: 18px;
                font-size: 14px;
                font-weight: 600;
                display: flex;
                align-items: center;
                gap: 15px;
                cursor: pointer;
                box-shadow: var(--shadow-raised-sm);
                transition: all var(--transition-speed) ease;
                text-align: left;
                outline: none;
            }

            .nav-btn:hover {
                color: var(--color-turquoise-dark);
                transform: translateY(-2px);
            }

            .nav-btn.active {
                box-shadow: var(--shadow-sunken);
                color: var(--color-turquoise-dark);
                background-color: var(--color-card-gray);
                transform: translateY(0);
            }

            .nav-btn i {
                font-size: 16px;
                transition: transform var(--transition-speed) ease;
            }

            .nav-btn:hover i {
                transform: scale(1.1);
            }

            /* Sidebar Footer Utilities */
            .sidebar-footer {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .btn-utility {
                background-color: var(--color-bg-gray);
                color: var(--color-turquoise-dark);
                border: none;
                padding: 12px 18px;
                border-radius: 14px;
                font-size: 13px;
                font-weight: 500;
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                box-shadow: var(--shadow-raised-sm);
                transition: all var(--transition-speed) ease;
                width: 100%;
            }

            .btn-utility:hover {
                box-shadow: var(--shadow-sunken-sm);
                transform: translateY(1px);
            }

            /* MAIN CONTENT */
            .main-content {
                flex: 1;
                margin-left: 280px;
                padding: 40px;
                display: flex;
                flex-direction: column;
                gap: 35px;
                box-sizing: border-box;
                max-width: calc(100% - 280px);
                min-width: 0;
                min-height: 100vh;
                transition:
                    margin-left var(--transition-speed) ease,
                    max-width var(--transition-speed) ease;
            }

            /* HEADER */
            .header-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
            }

            .header-title-area h1 {
                font-size: 24px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                margin-bottom: 5px;
            }

            .header-title-area p {
                font-size: 14px;
                color: var(--color-turquoise-dark);
                opacity: 0.8;
                font-weight: 500;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            /* Notifications */
            .notification-bell-container {
                position: relative;
            }

            .notification-bell {
                width: 48px;
                height: 48px;
                background-color: var(--color-bg-gray);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: var(--shadow-raised-sm);
                cursor: pointer;
                color: var(--color-turquoise-medium);
                transition: all var(--transition-speed) ease;
                position: relative;
            }

            .notification-bell:hover {
                box-shadow: var(--shadow-sunken-sm);
                color: var(--color-logo-red);
            }

            .notification-badge {
                position: absolute;
                top: 13px;
                right: 13px;
                width: 9px;
                height: 9px;
                background-color: var(--color-logo-red);
                border-radius: 50%;
                box-shadow: 0 0 8px var(--color-logo-red);
            }

            .notifications-dropdown {
                position: absolute;
                top: 60px;
                right: 0;
                width: 320px;
                background-color: var(--color-card-gray);
                border-radius: 20px;
                box-shadow:
                    8px 8px 24px var(--shadow-dark),
                    -8px -8px 24px var(--shadow-light);
                padding: 20px;
                display: none;
                flex-direction: column;
                gap: 15px;
                z-index: 200;
                transform-origin: top right;
                animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .notifications-dropdown.active {
                display: flex;
            }

            .dropdown-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                border-bottom: 1px solid rgba(2, 87, 99, 0.1);
                padding-bottom: 8px;
            }

            .dropdown-items {
                display: flex;
                flex-direction: column;
                gap: 10px;
                max-height: 250px;
                overflow-y: auto;
            }

            .dropdown-item {
                padding: 10px 12px;
                border-radius: 12px;
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-raised-sm);
                display: flex;
                gap: 10px;
                font-size: 12px;
                line-height: 1.4;
                cursor: pointer;
                transition: box-shadow var(--transition-speed) ease;
            }

            .dropdown-item:hover {
                box-shadow: var(--shadow-sunken-sm);
            }

            .dropdown-item i {
                color: var(--color-logo-red);
                margin-top: 2px;
            }

            .dropdown-item-content {
                flex: 1;
            }

            .dropdown-item-time {
                font-size: 10px;
                opacity: 0.6;
                margin-top: 4px;
                display: block;
            }

            /* Profile Card */
            .profile-card {
                padding: 8px 16px;
                border-radius: 16px;
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-raised-sm);
                display: flex;
                align-items: center;
                gap: 12px;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
            }

            .profile-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background-color: var(--color-turquoise-medium);
                color: #ffffff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                box-shadow: var(--shadow-raised-sm);
            }

            /* METRICS SECTION */
            .metrics-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 25px;
                width: 100%;
            }

            .metric-card {
                background-color: var(--color-card-gray);
                border-radius: 22px;
                padding: 22px;
                display: flex;
                flex-direction: column;
                gap: 12px;
                box-shadow: var(--shadow-raised);
                transition:
                    transform var(--transition-speed) ease,
                    box-shadow var(--transition-speed) ease;
                position: relative;
                overflow: hidden;
            }

            .metric-card:hover {
                transform: translateY(-4px);
            }

            .metric-card:active {
                box-shadow: var(--shadow-sunken);
                transform: translateY(0);
            }

            .metric-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .metric-title {
                font-size: 12px;
                font-weight: 700;
                color: var(--color-turquoise-dark);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                opacity: 0.8;
            }

            .metric-icon-wrapper {
                width: 40px;
                height: 40px;
                background-color: var(--color-bg-gray);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: var(--shadow-sunken-sm);
                color: var(--color-turquoise-medium);
                font-size: 16px;
            }

            .metric-value {
                font-size: 26px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                margin: 2px 0;
            }

            .metric-footer {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                font-weight: 500;
            }

            .trend-badge {
                display: flex;
                align-items: center;
                gap: 3px;
                font-weight: 700;
            }

            .trend-up {
                color: var(--color-turquoise-medium);
            }

            .trend-down {
                color: var(--color-logo-red);
            }

            /* FILTERS SECTION */
            .filter-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: var(--color-card-gray);
                padding: 15px 25px;
                border-radius: 20px;
                box-shadow: var(--shadow-raised);
            }

            .filter-info {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 14px;
                font-weight: 600;
            }

            .filter-info i {
                color: var(--color-turquoise-medium);
            }

            .filter-actions {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            /* Neumorphic Select */
            .select-wrapper {
                position: relative;
            }

            .select-neumorphic {
                appearance: none;
                background-color: var(--color-bg-gray);
                color: var(--color-turquoise-medium);
                border: none;
                padding: 12px 45px 12px 20px;
                border-radius: 14px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                box-shadow: var(--shadow-raised-sm);
                outline: none;
                transition: all var(--transition-speed) ease;
            }

            .select-neumorphic:focus {
                box-shadow: var(--shadow-sunken);
            }

            .select-wrapper::after {
                content: "\f107";
                font-family: "Font Awesome 6 Free";
                font-weight: 900;
                position: absolute;
                right: 20px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--color-turquoise-medium);
                pointer-events: none;
                transition: transform var(--transition-speed) ease;
            }

            /* CENTRAL SECTION (CHARTS & ACTION BUTTONS) */
            .charts-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 35px;
                width: 100%;
            }

            .charts-grid.two-columns {
                grid-template-columns: repeat(2, 1fr);
            }

            .chart-card {
                background-color: var(--color-card-gray);
                border-radius: 24px;
                padding: 30px;
                box-shadow: var(--shadow-raised);
                display: flex;
                flex-direction: column;
                gap: 25px;
                position: relative;
                min-width: 0;
            }

            .chart-card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .chart-card-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .chart-card-title i {
                color: var(--color-turquoise-dark);
            }

            .chart-canvas-wrapper {
                position: relative;
                width: 100%;
                height: 340px;
                min-width: 0;
                overflow: hidden;
            }

            /* BUTTONS */
            .btn-primary {
                background-color: var(--color-logo-red);
                color: #ffffff;
                border: none;
                padding: 12px 24px;
                border-radius: 16px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
                box-shadow:
                    4px 4px 10px rgba(200, 200, 200, 0.7),
                    -4px -4px 10px rgba(255, 255, 255, 0.9);
                transition: all var(--transition-speed) ease;
                outline: none;
            }

            .btn-primary:hover {
                background-color: #d61212;
                transform: translateY(-2px);
                box-shadow:
                    6px 6px 14px rgba(200, 200, 200, 0.8),
                    -6px -6px 14px rgba(255, 255, 255, 1);
            }

            .btn-primary:active {
                transform: translateY(0);
                box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.2);
            }

            /* DATA TABLES SECTION */
            .table-card {
                background-color: var(--color-card-gray);
                border-radius: 24px;
                padding: 30px;
                box-shadow: var(--shadow-raised);
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .table-card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .table-card-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .table-outer-container {
                width: 100%;
                overflow-x: auto;
                border-radius: 18px;
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-sunken);
                padding: 12px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: center;
                font-size: 13px;
                color: var(--color-turquoise-dark);
                min-width: 800px;
            }

            thead th {
                background-color: rgba(0, 130, 150, 0.06);
                color: var(--color-turquoise-medium);
                font-weight: 700;
                padding: 14px 10px;
                text-transform: uppercase;
                font-size: 11px;
                letter-spacing: 0.5px;
                position: sticky;
                top: 0;
            }

            thead th:first-child {
                border-radius: 12px 0 0 12px;
                text-align: left;
                padding-left: 20px;
            }

            thead th:last-child {
                border-radius: 0 12px 12px 0;
            }

            tbody tr {
                transition: background-color var(--transition-speed) ease;
            }

            tbody tr:hover {
                background-color: rgba(255, 255, 255, 0.4);
            }

            tbody td {
                padding: 14px 10px;
                border-bottom: 1px solid rgba(200, 200, 200, 0.3);
                font-weight: 500;
            }

            tbody td:first-child {
                text-align: left;
                padding-left: 20px;
                font-weight: 600;
            }

            tbody tr:last-child td {
                border-bottom: none;
            }

            /* Compliance color decorators */
            .compliance-high {
                color: var(--color-turquoise-medium);
                font-weight: 700;
            }

            .compliance-low {
                color: var(--color-logo-red);
                font-weight: 700;
            }

            /* LOADING SHIMMER EFFECT */
            .shimmer-bg {
                background: linear-gradient(
                    90deg,
                    var(--color-card-gray) 25%,
                    var(--color-bg-gray) 50%,
                    var(--color-card-gray) 75%
                );
                background-size: 200% 100%;
                animation: shimmer 1.5s infinite linear;
            }

            @keyframes shimmer {
                to {
                    background-position: -200% 0;
                }
            }

            /* TOAST NOTIFICATION */
            .toast-notification {
                position: fixed;
                bottom: 30px;
                right: 30px;
                background-color: var(--color-card-gray);
                border-left: 5px solid var(--color-logo-red);
                padding: 15px 25px;
                border-radius: 12px;
                box-shadow:
                    8px 8px 20px rgba(0, 0, 0, 0.15),
                    -8px -8px 20px #ffffff;
                display: flex;
                align-items: center;
                gap: 15px;
                z-index: 1000;
                transform: translateY(100px);
                opacity: 0;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .toast-notification.active {
                transform: translateY(0);
                opacity: 1;
            }

            .toast-icon {
                color: var(--color-logo-red);
                font-size: 20px;
            }

            .toast-text h4 {
                font-size: 14px;
                font-weight: 700;
                color: var(--color-turquoise-dark);
                margin-bottom: 2px;
            }

            .toast-text p {
                font-size: 12px;
                opacity: 0.8;
            }

            /* ANIMATIONS */
            @keyframes popIn {
                0% {
                    opacity: 0;
                    transform: scale(0.8) translateY(-10px);
                }
                100% {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
            }

            /* VIEW MANAGEMENT */
            .dashboard-view {
                display: none;
                flex-direction: column;
                gap: 35px;
                animation: popIn 0.35s ease;
            }

            .dashboard-view.active {
                display: flex;
            }

            /* ===== MEJORAS DE COLOR Y FILTROS (SLIDE 1) ===== */

            /* Acento de color en la barra lateral y header */
            .logo-text {
                background: linear-gradient(90deg, #008296, #2a9d8f);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .header-title-area h1 {
                background: linear-gradient(90deg, #e2674f, #0e8c9b);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                font-size: 23px;
            }

            /* Tarjetas de métricas con borde superior de color */
            .metric-card {
                border-top: 4px solid var(--accent, #008296);
            }
            .metric-card::after {
                content: "";
                position: absolute;
                top: -40px;
                right: -40px;
                width: 110px;
                height: 110px;
                border-radius: 50%;
                background: var(--accent, #008296);
                opacity: 0.06;
            }

            /* Filtros del slide 1 reubicados en la cabecera (arriba a la derecha) */
            .header-bar .header-title-area {
                flex: 1 1 auto;
                min-width: 0;
            }
            .slide1-header-filters {
                display: flex;
                align-items: flex-end;
                justify-content: flex-end;
                flex-wrap: nowrap;
                flex: 0 0 auto;
                gap: 14px;
            }
            .slide1-header-filters .filter-group > label {
                font-size: 11px;
                letter-spacing: 0.4px;
                white-space: nowrap;
            }
            .slide1-header-filters .select-neumorphic {
                padding: 12px 38px 12px 16px;
                font-size: 14px;
                border-radius: 14px;
            }
            .slide1-header-filters .select-wrapper::after {
                right: 16px;
                font-size: 13px;
            }
            .filter-group {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .filter-group > label {
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--color-turquoise-medium);
                padding-left: 4px;
            }

            /* Píldoras de leyenda del gráfico (como en el reporte) */
            .chart-legend {
                display: flex;
                gap: 22px;
                flex-wrap: wrap;
            }
            .legend-pill {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
            }
            .legend-swatch {
                width: 26px;
                height: 12px;
                border-radius: 4px;
                box-shadow: var(--shadow-raised-sm);
            }
            .legend-swatch.line {
                height: 4px;
                border-radius: 2px;
            }

            /* Resaltar columna del año seleccionado en la tabla resumen */
            .col-selected {
                background: rgba(0, 130, 150, 0.12) !important;
                color: var(--color-turquoise-dark) !important;
                font-weight: 800 !important;
            }
            thead th.col-selected {
                background: var(--color-turquoise-medium) !important;
                color: #fff !important;
            }

            .row-label-total {
                color: #0e8c9b;
            }
            .row-label-avg {
                color: #c98a3a;
            }

            /* ===== NAV CON 26 ÍTEMS (scroll) ===== */
            .nav-list {
                gap: 9px;

            // Construir los selectores de filtro y enganchar eventos
            function setupSlide1Filters() {
                const data = dashboardData.slide1;
                const yearSel = document.getElementById("f-year");
                const fromSel = document.getElementById("f-from");
                const toSel = document.getElementById("f-to");
                const segmentSel = document.getElementById("f-segment");
                const productSel = document.getElementById("f-product");
                const segRoleSel = document.getElementById("f-seg-role");
                if (!yearSel) return;

                // Años (de mayor a menor)
                const years = Object.keys(data.years)
                    .map(Number)
                    .sort((a, b) => b - a);
                yearSel.innerHTML = years
                    .map((y) => `<option value="${y}">${y}</option>`)
                    .join("");
                yearSel.value = slide1Filters.year;

                // Periodo inicial (default mensual Ene-Dic)
                updatePeriodOptions("s1");

                if (segmentSel) {
                    segmentSel.value = slide1Filters.segment;
                }
                if (productSel) {
                    productSel.value = slide1Filters.product;
                }
                if (segRoleSel) {
                    segRoleSel.value = slide1Filters.segRole || "supervisor";
                }
                populateSeguimientoSelectors();

                // Eventos en vivo
                document
                    .getElementById("f-metric")
                    .addEventListener("change", (e) => {
                        slide1Filters.metric = e.target.value;
                        if (activeSlide === "s1") renderSlide1();
                        else if (activeSlide === "s4") renderView();
                    });
                document
                    .getElementById("f-segment")
                    .addEventListener("change", (e) => {
                        slide1Filters.segment = e.target.value;
                        const selectedText =
                            e.target.options[e.target.selectedIndex].text;
                        const label = document.querySelector(
                            "#group-segment label",
                        );
                        if (label) {
                            label.innerHTML = `<i class="fa-solid fa-filter"></i> ${selectedText}`;
                        }
                        if (activeSlide === "s2") renderView();
                    });
                document
                    .getElementById("f-product")
                    .addEventListener("change", (e) => {
                        slide1Filters.product = e.target.value;
                        const selectedText =
                            e.target.options[e.target.selectedIndex].text;
                        const label = document.querySelector(
                            "#group-product label",
                        );
                        if (label) {
                            label.innerHTML = `<i class="fa-solid fa-filter"></i> ${selectedText}`;
                        }
                        if (activeSlide === "s3") renderView();
                    });
                document
                    .getElementById("f-supervisor")
                    .addEventListener("change", (e) => {
                        slide1Filters.supervisor = e.target.value;
                        if (
                            ["s9", "s10", "s11", "s12", "s14"].includes(
                                activeSlide,
                            )
                        )
                            renderView();
                    });
                document
                    .getElementById("f-seg-role")
                    .addEventListener("change", (e) => {
                        slide1Filters.segRole = e.target.value;
                        populateSeguimientoSelectors();
                        if (
                            ["s9", "s10", "s11", "s12", "s14"].includes(
                                activeSlide,
                            )
                        )
                            renderView();
                    });
                document
                    .getElementById("f-mall")
                    .addEventListener("change", (e) => {
                        slide1Filters.mall = e.target.value;
                        if (activeSlide === "s12") renderView();
                    });
                yearSel.addEventListener("change", (e) => {
                    slide1Filters.year = Number(e.target.value);
                    if (activeSlide === "s1") {
                        renderSlide1();
                    } else {
                        renderView();
                    }
                });
                fromSel.addEventListener("change", (e) => {
                    slide1Filters.from = Number(e.target.value);
                    if (slide1Filters.from > slide1Filters.to) {
                        slide1Filters.to = slide1Filters.from;
                        toSel.value = slide1Filters.to;
                    }
                    if (activeSlide === "s1") {
                        renderSlide1();
                    } else {
                        renderView();
                    }
                });
                toSel.addEventListener("change", (e) => {
                    slide1Filters.to = Number(e.target.value);
                    if (slide1Filters.to < slide1Filters.from) {
                        slide1Filters.from = slide1Filters.to;
                        fromSel.value = slide1Filters.from;
                    }
                    if (activeSlide === "s1") {
                        renderSlide1();
                    } else {
                        renderView();
                    }
                });
            }

            // ====== NAVBAR (generado desde SLIDES) ======
            function buildNav() {
                document.getElementById("nav-list").innerHTML = SLIDES.map(
                    (s) => {
                        const isHidden = parseInt(s.id.substring(1)) >= 13;
                        return `
        <li class="nav-item"${isHidden ? ' style="display: none;"' : ''}>
          <button class="nav-btn${s.id === "s1" ? " active" : ""}" id="btn-${s.id}" onclick="selectSlide('${s.id}')">
            <i class="fa-solid ${s.icon}"></i>
            <span>${s.label}</span>
          </button>
        </li>`;
                    }
                ).join("");
            }

            // ====== ROUTER ======
            function selectSlide(id) {
                activeSlide = id;
                document
                    .querySelectorAll(".nav-btn")
                    .forEach((b) => b.classList.remove("active"));
                const btn = document.getElementById("btn-" + id);
                if (btn) btn.classList.add("active");
                // destruir gráficos dinámicos previos
                Object.keys(dynCharts).forEach((k) => {
                    dynCharts[k].destroy();
                    delete dynCharts[k];
                });
                renderView();
                const mc = document.querySelector(".main-content");
                if (mc) mc.scrollTo({ top: 0, behavior: "smooth" });
            }

            function updateYearOptions(slideId) {
                const yearSel = document.getElementById("f-year");
                if (!yearSel) return;

                let validYears = [];
                if (slideId === "s1" || slideId === "s4") {
                    validYears = [2026, 2025, 2024];
                } else if (slideId === "s2" || slideId === "s3") {
                    validYears = [2026, 2025, 2024, 2023, 2022, 2021, 2020];
                } else {
                    validYears = [2026, 2025, 2024];
                }

                const currentVal = Number(yearSel.value);
                yearSel.innerHTML = validYears
                    .map((y) => `<option value="${y}">${y}</option>`)
                    .join("");
                if (validYears.includes(currentVal)) {
                    yearSel.value = currentVal;
                } else {
                    yearSel.value = 2026;
                    slide1Filters.year = 2026;
                }
            }

            function cloneAndScaleSeguimientoTable(table, factor) {
                const scaledRows = table.rows.map((row) => {
                    const label = row[0];
                    if (label === "% Crec") return row.slice();
                    const scaled = row.slice(1).map((cell) => {
                        const v = num(cell);
                        if (!v) return cell;
                        return new Intl.NumberFormat("es-PE", {
                            maximumFractionDigits: 0,
                        }).format(Math.round(v * factor));
                    });
                    return [label, ...scaled];
                });
                return { headers: table.headers.slice(), rows: scaledRows };
            }

            function populateSeguimientoSelectors() {
                ensureSeguimientoPeopleData();
                const d = dashboardData.slide9;
                if (!d || !d.peopleByRole) return;
                const roleSel = document.getElementById("f-seg-role");
                const personSel = document.getElementById("f-supervisor");
                if (!roleSel || !personSel) return;

                const role =
                    roleSel.value || slide1Filters.segRole || "supervisor";
                slide1Filters.segRole = role;
                const people = d.peopleByRole[role] || {};
                const keys = Object.keys(people);
                if (!keys.length) return;

                if (!people[slide1Filters.supervisor])
                    slide1Filters.supervisor = keys[0];
                personSel.innerHTML = keys
                    .map(
                        (k) =>
                            `<option value="${k}">${people[k].name}</option>`,
                    )
                    .join("");
                personSel.value = slide1Filters.supervisor;
                const label = document.querySelector("#group-supervisor label");
                if (label)
                    label.innerHTML = `<i class="fa-solid fa-user-tie"></i> Persona`;
            }

            function renderView() {
                updateYearOptions(activeSlide);
                updatePeriodOptions(activeSlide);

                const currentSlide = SLIDES.find((s) => s.id === activeSlide);
                const isIframe = currentSlide && currentSlide.kind === "iframe";

                const isSlide1 = activeSlide === "s1" && !isIframe;
                const isSlide2 = activeSlide === "s2" && !isIframe;
                const isSlide3 = activeSlide === "s3";
                const isSlide4 = activeSlide === "s4";
                const isSlide5 = activeSlide === "s5";
                const isSlide6 = activeSlide === "s6";
                const isSlide7 = activeSlide === "s7";
                const isSlide8 = activeSlide === "s8";
                const isSlide9 = activeSlide === "s9";
                const isSlide10 = activeSlide === "s10";
                const isSlide11 = activeSlide === "s11";
                const isSlide12 = activeSlide === "s12";
                const isSlide13 = activeSlide === "s13";
                const isSlide14 = activeSlide === "s14";
                const hasFilters =
                    isSlide1 ||
                    isSlide2 ||
                    isSlide3 ||
                    isSlide4 ||
                    isSlide5 ||
                    isSlide6 ||
                    isSlide7 ||
                    isSlide8 ||
                    isSlide9 ||
                    isSlide10 ||
                    isSlide11 ||
                    isSlide12 ||
                    isSlide13 ||
                    isSlide14;

                const hf = document.getElementById("slide1-header-filters");
                if (hf) hf.style.display = hasFilters ? "flex" : "none";

                // Ocultar/mostrar el selector de métrica (cantidad/monto) según corresponda
                const metricFilterGroup =
                    document.getElementById("group-metric");
                if (metricFilterGroup) {
                    metricFilterGroup.style.display =
                        isSlide1 || isSlide4 ? "flex" : "none";
                }

                // Ocultar/mostrar el selector de origen/canal según corresponda
                const segmentFilterGroup =
                    document.getElementById("group-segment");
                if (segmentFilterGroup) {
                    segmentFilterGroup.style.display = isSlide2
                        ? "flex"
                        : "none";
                }

                // Ocultar/mostrar el selector de supervisor según corresponda
                const segRoleFilterGroup =
                    document.getElementById("group-seg-role");
                if (segRoleFilterGroup) {
                    segRoleFilterGroup.style.display =
                        isSlide9 ||
                        isSlide10 ||
                        isSlide11 ||
                        isSlide12 ||
                        isSlide14
                            ? "flex"
                            : "none";
                }

                // Ajustar las opciones de rol de forma dinámica según la vista
                const segRoleSel = document.getElementById("f-seg-role");
                if (segRoleSel) {
                    const currentVal =
                        segRoleSel.value ||
                        slide1Filters.segRole ||
                        "supervisor";
                    if (isSlide12) {
                        // Venta por C. Comercial solo permite Gerencia, Subgerente, Supervisor
                        segRoleSel.innerHTML = `
                            <option value="gerencia">Gerencia</option>
                            <option value="subgerente">Subgerente</option>
                            <option value="supervisor">Supervisor</option>
                        `;
                        if (currentVal === "vendedor") {
                            segRoleSel.value = "supervisor";
                            slide1Filters.segRole = "supervisor";
                        } else {
                            segRoleSel.value = currentVal;
                        }
                    } else {
                        // Otras vistas permiten también Vendedor
                        segRoleSel.innerHTML = `
                            <option value="gerencia">Gerencia</option>

            // ---- REPORT GERENCIAL (slide 10) ----
            function cloneAndScaleReporteGerencialTable(table, factor) {
                const scaledVariables = table.variables.map((variable) => {
                    const name = variable.name;
                    // Don't scale percentages, averages, or decimals
                    if (
                        name.includes("%") ||
                        name === "Productividad" ||
                        name === "CIC Promedio"
                    ) {
                        return { name, values: variable.values.slice() };
                    }
                    const scaledVals = variable.values.map((val) => {
                        if (val == null) return null;
                        if (typeof val === "string") {
                            const numVal =
                                parseFloat(val.replace(/[k$,]/g, "")) *
                                (val.includes("k") ? 1000 : 1);
                            const scaled = Math.round(numVal * factor);
                            return scaled >= 1000
                                ? (scaled / 1000).toFixed(1) + "k"
                                : scaled;
                        }
                        return Math.round(val * factor);
                    });
                    return { name, values: scaledVals };
                });
                return {
                    months: table.months.slice(),
                    variables: scaledVariables,
                };
            }

                    const scaledRows = feeTable.rows.map((row) => {

                            .slice(1, -1)
                            .map((v) =>
                                v === ""

                            );
                        const rowSum = vals.reduce(
                            (sum, v) => sum + (num(v) || 0),
                            0,
                        );
                        return [name, ...vals, String(rowSum)];

                    const colTotals = ["Total general"];
                    for (let col = 1; col <= 5; col++) {

                            (sum, r) => sum + (num(r[col]) || 0),
                            0,
                        );
                        colTotals.push(colSum === 0 ? "" : String(colSum));

                    colTotals.push(
                        String(

                                .slice(1)
                                .reduce((sum, v) => sum + num(v), 0),

                if (!sup) {

                const fee = sup.feeDistribution;

                // Select specific month filter
                const monthIdx = Math.min(
                    slide1Filters.from || 0,
                    orig.months.length - 1,
                );
                const selectedMonthName = orig.months[monthIdx];

                // Calculate month factor relative to January (index 0) to dynamically scale the fee distribution table
                const getMonthSalesTotal = (mIdx) =>
                    orig.categories.reduce(
                        (sum, cat) =>
                            sum +
                            ((orig.series[cat] && orig.series[cat][mIdx]) || 0),
                        0,
                    );
                const janTotal = getMonthSalesTotal(0);
                const activeMonthTotal = getMonthSalesTotal(monthIdx);
                const monthFactor = janTotal
                    ? activeMonthTotal / janTotal
                    : 1.0;

                // Scale the fee distribution table dynamically for the selected month
                const scaleFeeTableForMonth = (feeTable, factor) => {
                    const scaledRows = feeTable.rows.map((row) => {
                        const name = row[0];
                        const vals = row
                            .slice(1, -1)
                            .map((v) =>
                                v === ""
                                    ? ""
                                    : String(
                                          Math.max(
                                              1,
                                              Math.round(num(v) * factor),

                        const rowSum = vals.reduce(
                            (sum, v) => sum + (num(v) || 0),
                            0,

                        return [name, ...vals, String(rowSum)];

                    const colTotals = ["Total general"];

                host.innerHTML = `

            <div class="seg-table-wrapper" style="max-height: 400px; overflow-y: auto;">

            function renderSalesTable(isMonto) {
                const data = dashboardData.slide1;
                const table = document.getElementById("dyn-table");
                const years = Object.keys(data.years)
                    .map(Number)
                    .sort((a, b) => a - b);
                const fmt = (v) =>
                    new Intl.NumberFormat("es-PE", {
                        maximumFractionDigits: 0,
                    }).format(v);
                const sel = slide1Filters.year;
                const pref = isMonto ? "S/ " : "";

                let head = "<thead><tr><th>AÑO</th>";
                years.forEach((y) => {
                    head += `<th class="${y === sel ? "col-selected" : ""}">${y}</th>`;
                });
                head += "</tr></thead>";

                const totalRow = [],
                    avgRow = [];
                years.forEach((y) => {
                    const serie =
                        (isMonto
                            ? data.years[y].monto
                            : data.years[y].cantidad) || [];
                    const vals = serie.filter((v) => v != null);
                    const total = vals.reduce((a, v) => a + v, 0);
                    const avg = vals.length ? total / vals.length : 0;
                    totalRow.push({ y, v: total });
                    avgRow.push({ y, v: Math.round(avg) });
                });

                let body = `<tbody><tr><td class="row-label-total"><i class="fa-solid fa-coins"></i> TOTAL</td>`;
                totalRow.forEach(
                    (c) =>
                        (body += `<td class="${c.y === sel ? "col-selected" : ""}">${pref}${fmt(c.v)}</td>`),
                );
                body += `</tr><tr><td class="row-label-avg"><i class="fa-solid fa-chart-simple"></i> PROMEDIO</td>`;
                avgRow.forEach(
                    (c) =>
                        (body += `<td class="${c.y === sel ? "col-selected" : ""}">${pref}${fmt(c.v)}</td>`),
                );
                body += "</tr></tbody>";

                table.innerHTML = head + body;
            }

            function renderSlide1() {
                const data = dashboardData.slide1;
                const { metric, year, from, to } = slide1Filters;
                const isMonto = metric === "monto";
                const months = data.months;

                const cur = data.years[year] || {};
                const prev = data.years[year - 1] || {};

                const curSeries = isMonto ? cur.monto : cur.cantidad;
                const prevSeries = isMonto ? prev.monto : prev.cantidad;
                const presSeries = isMonto
                    ? cur.presupuestoMonto
                    : cur.presupuesto;

                // Recorte por periodo (desde - hasta)
                const labels = months.slice(from, to + 1);
                const curVals = (curSeries || []).slice(from, to + 1);
                const prevVals = (prevSeries || []).slice(from, to + 1);
                const presVals = (presSeries || []).slice(from, to + 1);

                // Título y subtítulo
                const fromName = MONTH_NAMES[from],
                    toName = MONTH_NAMES[to];
                const periodTxt =
                    from === to ? fromName : `${fromName} – ${toName}`;
                document.getElementById("dashboard-title").textContent =
                    `${data.title}: ${periodTxt} ${year}`;
                document.getElementById("dashboard-subtitle").textContent =
                    `Métrica: ${isMonto ? "Monto (S/.)" : "Cantidad de ventas"} · Comparativo ${year} vs ${year - 1} vs Presupuesto`;

                    `${isMonto ? "Monto" : "Cantidad"} de ventas (${year} vs ${year - 1} vs Presupuesto)`;

                // Métricas (KPIs) calculadas sobre el periodo seleccionado
                renderSlide1Metrics(curVals, presVals, prevVals, isMonto, year);

                // Gráfico y tabla
                initChartSlide1({
                    labels,

                });

            // KPIs del slide 1
            function renderSlide1Metrics(
                curVals,
                presVals,
                prevVals,
                isMonto,
                year,
            ) {
                const sum = (arr) => arr.reduce((a, v) => a + (v || 0), 0);
                const count = (arr) => arr.filter((v) => v != null).length;

                const totalCur = sum(curVals);
                const nMonths = count(curVals) || 1;
                const avgCur = totalCur / nMonths;
                const totalPres = sum(presVals);
                const totalPrev = sum(prevVals);
                const compliance = totalPres ? (totalCur / totalPres) * 100 : 0;
                const yoy = totalPrev
                    ? ((totalCur - totalPrev) / totalPrev) * 100
                    : 0;

                const fmt = (v) =>
                    isMonto
                        ? "S/ " +
                          new Intl.NumberFormat("es-PE", {
                              maximumFractionDigits: 0,
                          }).format(v)
                        : new Intl.NumberFormat("es-PE", {
                              maximumFractionDigits: 0,
                          }).format(v);

                const cards = [
                    {
                        title: `Ventas Totales ${year}`,
                        value: fmt(totalCur),
                        icon: "fa-solid fa-cart-shopping",
                        trendText: `${yoy >= 0 ? "+" : ""}${yoy.toFixed(1)}% vs ${year - 1}`,
                        trendUp: yoy >= 0,
                        accentColor: "#0E8C9B",
                    },
                    {
                        title: "Promedio Mensual",
                        value: fmt(Math.round(avgCur)),
                        icon: "fa-solid fa-calculator",
                        trendText: `${nMonths} mes(es) con data`,
                        trendUp: true,
                        accentColor: "#3A7CA5",
                    },
                    {
                        title: "Meta Acumulada",
                        value: fmt(totalPres),
                        icon: "fa-solid fa-bullseye",
                        trendText: "Presupuesto del periodo",
                        trendUp: true,
                        accentColor: "#E0A458",
                    },
                    {
                        title: "Cumplimiento",
                        value: compliance.toFixed(1) + "%",
                        icon: "fa-solid fa-percentage",
                        trendText: `${compliance >= 100 ? "+" : ""}${(compliance - 100).toFixed(1)}% vs meta`,
                        trendUp: compliance >= 100,
                        accentColor: "#E2674F",
                    },
                ];
                renderMetricCards(cards);
            }

            // TABLE GENERATION - SLIDE 1 (Resumen anual: Total y Promedio por año)
            function renderTableSlide1(isMonto) {
                const data = dashboardData.slide1;
                const table = document.getElementById("table-slide1");
                const thead = table.querySelector("thead");
                const tbody = table.querySelector("tbody");

                const years = Object.keys(data.years)
                    .map(Number)
                    .sort((a, b) => a - b);
                const fmt = (v) =>
                    new Intl.NumberFormat("es-PE", {
                        maximumFractionDigits: 0,
                    }).format(v);
                const sel = slide1Filters.year;

                // Cabecera
                let head = "<tr><th>AÑO</th>";
                years.forEach((y) => {
                    head += `<th class="${y === sel ? "col-selected" : ""}">${y}</th>`;
                });
                thead.innerHTML = head + "</tr>";

                // Calcular total y promedio por año según métrica
                const totalRow = [],
                    avgRow = [];
                years.forEach((y) => {
                    const serie =
                        (isMonto
                            ? data.years[y].monto
                            : data.years[y].cantidad) || [];
                    const vals = serie.filter((v) => v != null);
                    const total = vals.reduce((a, v) => a + v, 0);
                    const avg = vals.length ? total / vals.length : 0;
                    totalRow.push({ y, v: total });
                    avgRow.push({ y, v: Math.round(avg) });
                });

                const pref = isMonto ? "S/ " : "";
                let body = `<tr><td class="row-label-total"><i class="fa-solid fa-coins"></i> TOTAL</td>`;
                totalRow.forEach(
                    (c) =>
                        (body += `<td class="${c.y === sel ? "col-selected" : ""}">${pref}${fmt(c.v)}</td>`),
                );
                body += `</tr><tr><td class="row-label-avg"><i class="fa-solid fa-chart-simple"></i> PROMEDIO</td>`;
                avgRow.forEach(
                    (c) =>
                        (body += `<td class="${c.y === sel ? "col-selected" : ""}">${pref}${fmt(c.v)}</td>`),
                );
                body += "</tr>";
                tbody.innerHTML = body;
            }

            // TABLE GENERATION - SLIDE 2 (13 months rows)
            function renderTableSlide2(tableData) {
                const tbody = document
                    .getElementById("table-slide2")
                    .querySelector("tbody");
                tbody.innerHTML = "";

                tableData.months.forEach((month, index) => {
                    const venta = tableData.ventas[index];
                    const pres = tableData.presupuesto[index];

                    // Calculate compliance %
                    const pct = (venta / pres) * 100;
                    const pctFormatted = pct.toFixed(1) + "%";
                    const isGood = pct >= 100;

                    const complianceClass = isGood
                        ? "compliance-high"
                        : "compliance-low";
                    const statusBadge = isGood
                        ? `<span class="compliance-high"><i class="fa-solid fa-circle-check"></i> Meta Alcanzada</span>`
                        : `<span class="compliance-low"><i class="fa-solid fa-circle-exclamation"></i> En Desviación</span>`;

                    const rowHtml = `
          <tr>
            <td style="text-align: left; padding-left: 20px;"><strong>${month}</strong></td>
            <td>${venta.toFixed(1)}</td>
            <td>${pres.toFixed(1)}</td>
            <td class="${complianceClass}">${pctFormatted}</td>
            <td>${statusBadge}</td>
          </tr>
        `;
                    tbody.innerHTML += rowHtml;
                });
            }

            // FILTERS APPLICATOR (SIMULATION)
            function applyFilter(filterVal) {
                showToast(
                    "Actualizando Segmento",
                    `Cargando datos del canal para: ${filterVal.toUpperCase()}`,
                );

                const tableOuter = document.querySelector(
                    "#view-slide2 .table-outer-container",
                );
                const chartCards = document.querySelectorAll(
                    "#view-slide2 .chart-card",
                );

                // Show visual loading shimmer class
                tableOuter.classList.add("shimmer-bg");
                chartCards.forEach((c) => c.classList.add("shimmer-bg"));

                setTimeout(() => {
                    tableOuter.classList.remove("shimmer-bg");
                    chartCards.forEach((c) => c.classList.remove("shimmer-bg"));

                    // Generate simulated variations of Slide 2 data based on filter
                    const multiplier =
                        filterVal === "lima"
                            ? 0.75
                            : filterVal === "provincia"
                              ? 0.25
                              : 1.0;
                    const originalData = dashboardData.slide2;

                    const filteredAnnual = {
                        categories: originalData.chartAnnual.categories,
                        values: originalData.chartAnnual.values.map((v) =>
                            Number((v * multiplier).toFixed(1)),
                        ),
                        name: originalData.chartAnnual.name,
                    };

                    const filteredMonthly = {
                        categories: originalData.chartMonthly.categories,
                        series: [
                            {
                                name: originalData.chartMonthly.series[0].name,
                                values: originalData.chartMonthly.series[0].values.map(
                                    (v) => Number((v * multiplier).toFixed(1)),
                                ),
                            },
                            {
                                name: originalData.chartMonthly.series[1].name,
                                values: originalData.chartMonthly.series[1].values.map(
                                    (v) => Number((v * multiplier).toFixed(1)),
                                ),
                            },
                        ],
                    };

                    const filteredTable = {
                        months: originalData.table.months,
                        ventas: originalData.table.ventas.map(
                            (v) => v * multiplier,
                        ),
                        presupuesto: originalData.table.presupuesto.map(
                            (v) => v * multiplier,
                        ),
                    };

                    // Redraw with filtered data
                    initChartsSlide2(filteredAnnual, filteredMonthly);
                    renderTableSlide2(filteredTable);

                    // Update the metric card totals for Slide 2
                    const metricsContainer =
                        document.getElementById("metrics-container");
                    metricsContainer.innerHTML = "";

                    const avg2026 = (270.7 * multiplier).toFixed(1);
                    const lastVenta = (215 * multiplier).toFixed(1);
                    const lastPres = (258.3 * multiplier).toFixed(1);
                    const complianceVal = (
                        (lastVenta / lastPres) *
                        100
                    ).toFixed(1);
                    const trendUp = complianceVal >= 100;

                    const cardsData = [
                        {
                            title: `Promedio Anual (${filterVal.toUpperCase()})`,
                            value: avg2026,
                            icon: "fa-solid fa-calendar-days",
                            trendText: `Promedio del canal`,
                            trendUp: true,
                            accentColor: "#025763",
                        },
                        {
                            title: "Ventas Mar 26",
                            value: lastVenta,
                            icon: "fa-solid fa-shop",
                            trendText: "Venta real canal",
                            trendUp: trendUp,
                            accentColor: "#457B9D",
                        },
                        {
                            title: "Presupuesto Mar 26",
                            value: lastPres,
                            icon: "fa-solid fa-chart-line",
                            trendText: "Presupuesto canal",
                            trendUp: true,
                            accentColor: "#D97706",
                        },
                        {
                            title: "Cumplimiento Canal",
                            value: `${complianceVal}%`,
                            icon: "fa-solid fa-check-double",
                            trendText: trendUp
                                ? "Meta cumplida"
                                : "Por debajo de meta",
                            trendUp: trendUp,
                            accentColor: "#7B2CBF",
                        },
                    ];

                    cardsData.forEach((card) => {
                        const trendClass = card.trendUp
                            ? "trend-up"
                            : "trend-down";
                        const trendIcon = card.trendUp
                            ? "fa-arrow-trend-up"
                            : "fa-arrow-trend-down";

                        const cardHtml = `
            <div class="metric-card">
              <div class="metric-header">
                <span class="metric-title">${card.title}</span>
                <div class="metric-icon-wrapper" style="color: ${card.accentColor};">
                  <i class="${card.icon}"></i>
                </div>
              </div>
              <div class="metric-value" style="color: ${card.accentColor};">${card.value}</div>
              <div class="metric-footer">
                <span class="trend-badge ${trendClass}">
                  <i class="fa-solid ${trendIcon}"></i>
                  <span>${card.trendText}</span>
                </span>
              </div>
            </div>
          `;
                        metricsContainer.innerHTML += cardHtml;
                    });
                }, 550);
            }

                // HTML base del documento Word
                let htmlContent = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head>
                        <title>Reporte Maqui</title>
                        <!--[if gte mso 9]>
                        <xml>
                            <w:WordDocument>
                                <w:View>Print</w:View>
                                <w:Zoom>100</w:Zoom>
                                <w:DoNotOptimizeForBrowser/>
                            </w:WordDocument>
                        </xml>
                        <![endif]-->
                        <style>
                            body { font-family: Arial, sans-serif; font-size: 11pt; color: #025763; line-height: 1.5; }
                            h1 { color: #f01515; font-size: 20pt; margin-top: 30px; margin-bottom: 5px; text-align: center; }

                            th { background-color: #008296; color: #ffffff; border: 1px solid #ccc; padding: 8px; font-weight: bold; text-align: center; }
                            td { border: 1px solid #ccc; padding: 8px; text-align: center; }
                            strong { color: #025763; }
                            .img-container { text-align: center; margin-top: 15px; margin-bottom: 15px; }
                            img { max-width: 100%; height: auto; border: 1px solid #ddd; }
                            .page-break { page-break-before: always; }
                        </style>
                    </head>
                    <body>
                        <h1 style="color: #008296;">PORTAL CORPORATIVO DE BUSINESS INTELLIGENCE - MAQUI</h1>
                        <h2 style="color: #025763;">Reporte consolidado - ${new Date().toLocaleDateString("es-PE")}</h2>
                `;

                const slidesToExport = onlyActive ? [activeSlideObj] : SLIDES;

                // Crear contenedor temporal invisible para renderizar slides no cargados
                const tempHost = document.createElement("div");
                tempHost.style.display = "none";
                tempHost.id = "temp-export-host";
                document.body.appendChild(tempHost);

                slidesToExport.forEach((slide, index) => {
                    if (index > 0) {
                        htmlContent += `<div class="page-break"></div>`;
                    }

                    htmlContent += `<h1 style="color: #f01515; font-size: 18pt;">${slide.label}</h1>`;
                    if (slide.title) {
                        htmlContent += `<h3>${slide.title}</h3>`;
                    }
                    if (slide.subtitle) {
                        htmlContent += `<p><em>${slide.subtitle}</em></p>`;
                    }

                    if (slide.kind === "iframe") {
                        htmlContent += `
                            <p><strong>Tablero Interactivo (Power BI):</strong></p>
                            <p><a href="${slide.iframeUrl}">${slide.iframeUrl}</a></p>
                            <p><em>Para consultar este reporte, por favor acceda mediante el enlace anterior en su navegador.</em></p>
                        `;
                    } else if (slide.kind === "image") {
                        if (slide.images && slide.images.length > 0) {
                            slide.images.forEach(imgSrc => {

                                htmlContent += `
                                    <div class="img-container">
                                        <img src="${absoluteImgUrl}" alt="Reporte visual" />
                                    </div>
                                `;
                            });
                        }
                    } else {
                        // Slide dinámico
                        let containerToRead = null;
                        
                        if (slide.id === activeSlide) {
                            const activeViewId = activeSlide === "s1" ? "view-slide1" : "view-dynamic";
                            containerToRead = document.getElementById(activeViewId);

                            tempHost.innerHTML = "";
                            const renderer = {
                                origin: renderOrigin,
                                sales: renderSales,
                                grouped: renderGrouped,
                                stacked: renderStacked,
                                limaprov: renderLimaProv,
                                anulaciones: renderAnulaciones,
                                seguimiento: renderSeguimiento,

                                cuotainscripcion: renderCuotaInscripcion,

                                ventadiaria: renderVentaDiaria,
                                productividadreporte: renderProductividadReporte,
                            }[slide.kind];
                            
                            if (renderer) {
                                try {
                                    renderer(slide, tempHost);
                                    containerToRead = tempHost;
                                } catch (e) {
                                    console.error("Error al renderizar slide temporal para exportación:", e);

                        if (containerToRead) {

                            tables.forEach((table, idx) => {
                                const tableTitleEl = table.closest("section, .table-card")?.querySelector("h3, .table-card-title");
                                const tableTitle = tableTitleEl ? tableTitleEl.textContent.trim() : `Tabla de Datos ${idx + 1}`;

                                const cloneTable = table.cloneNode(true);
                                cloneTable.querySelectorAll("i").forEach(icon => icon.remove());
                                cloneTable.style.width = "100%";
                                cloneTable.style.border = "1px solid #ccc";
                                
                                htmlContent += cloneTable.outerHTML;
                            });
                        }
                    }
                });

                // Eliminar el host temporal
                document.body.removeChild(tempHost);

                htmlContent += `
                    </body>
                    </html>
                `;

                const blob = new Blob([htmlContent], { type: "application/msword;charset=utf-8" });
                const suffix = onlyActive ? activeSlideObj.label.toLowerCase().replace(/[^a-z0-9]/g, "_") : "completo";
                const filename = `reporte_maqui_${suffix}_${new Date().toISOString().slice(0, 10)}.doc`;

                const link = document.createElement("a");
                if (link.download !== undefined) {
                    const url = URL.createObjectURL(blob);
                    link.setAttribute("href", url);
                    link.setAttribute("download", filename);
                    link.style.visibility = "hidden";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showToast("Exportación Exitosa", `Se descargó el archivo: ${filename}`);
                } else {
                    showToast("Error de Exportación", "Tu navegador no soporta descargas automáticas.");
                }
            }

                    const tableTitleEl = table.closest("section, .table-card")?.querySelector("h3, .table-card-title");
                    if (tableTitleEl) {
                        csvContent += `"${tableTitleEl.textContent.trim().replace(/"/g, '""')}"\n`;
                    }

                    const rows = table.querySelectorAll("tr");
                    rows.forEach((row) => {
                        const cells = row.querySelectorAll("th, td");
                        const rowData = Array.from(cells).map((cell) => {
                            let text = cell.innerText.trim().replace(/"/g, '""');
                            return `"${text}"`;
                        });
                        csvContent += rowData.join(";") + "\n";
                    });
                });

                const bom = "\uFEFF";
                const sepLine = "sep=;\n";
                const blob = new Blob([bom + sepLine + csvContent], { type: "text/csv;charset=utf-8;" });
                
                const slideObj = SLIDES.find((s) => s.id === activeSlide);
                const slideLabel = slideObj ? slideObj.label.toLowerCase().replace(/[^a-z0-9]/g, "_") : "reporte";
                const filename = `reporte_${slideLabel}_${new Date().toISOString().slice(0, 10)}.csv`;

                const link = document.createElement("a");
                if (link.download !== undefined) {
                    const url = URL.createObjectURL(blob);
                    link.setAttribute("href", url);
                    link.setAttribute("download", filename);
                    link.style.visibility = "hidden";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showToast("Exportación Exitosa", `Se descargó el archivo: ${filename}`);
                }
            }

            // ====== EXPORTAR A PDF (IMPRIMIR) ======
            function downloadReportPDF() {
                showToast("Generando PDF", "Preparando la vista de impresión...");
                setTimeout(() => {
                    window.print();
                }, 600);
            }

            // ====== EASTER EGG Y SHORTCUTS ======
            let logoClicks = 0;
            const logoImg = document.querySelector(".logo-img");
            if (logoImg) {
                logoImg.style.cursor = "pointer";
                logoImg.addEventListener("click", () => {
                    logoClicks++;
                    if (logoClicks >= 5) {
                        const container = document.getElementById("secret-export-container");
                        if (container) {
                            if (container.style.display === "none" || container.style.display === "") {
                                container.style.display = "flex";
                                showToast("Menú Secreto", "Panel de exportación activado.");
                            } else {
                                container.style.display = "none";
                                showToast("Menú Secreto", "Panel de exportación desactivado.");
                            }
                        }
                        logoClicks = 0;
                    }
                });
            }

            // Teclas de acceso directo: Ctrl + Alt + W (Exportar Vista), Ctrl + Alt + A (Exportar Todo)
            document.addEventListener("keydown", (e) => {
                if (e.ctrlKey && e.altKey) {
                    if (e.key === "w" || e.key === "W" || e.key === "∑" || e.key === "w" || e.key === "W") {
                        e.preventDefault();
                        exportReportWord(true); // Exportar vista activa
                    } else if (e.key === "a" || e.key === "A" || e.key === "å" || e.key === "a" || e.key === "A") {
                        e.preventDefault();
                        exportReportWord(false); // Exportar todas las vistas
                    }
                }
            });
            
            // Permitir que la consola de desarrollo o scripts externos puedan llamarlas
            window.exportReportWord = exportReportWord;
            window.exportReportExcel = exportReportExcel;
            window.downloadReportPDF = downloadReportPDF;
            window.showSecretExport = () => {
                const container = document.getElementById("secret-export-container");
                if (container) container.style.display = "flex";
            };
            window.hideSecretExport = () => {
                const container = document.getElementById("secret-export-container");
                if (container) container.style.display = "none";
            };
            
            // Añadir estilos CSS de impresión para ocultar la barra secreta de exportación
            const printStyle = document.createElement("style");
            printStyle.innerHTML = "@media print { #secret-export-container { display: none !important; } }";
            document.head.appendChild(printStyle);
        </script>
    </body>
</html>
