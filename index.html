            // TABLE GENERATION - SLIDE 1 (Resumen anual: Total y Promedio por año)
            function renderTableSlide1(isMonto) {
                const data = dashboardData.slide1;
                const table = document.getElementById("table-slide1");
                const thead = table.querySelector("thead");
                const tbody = table.querySelector("tbody");

                const years = Object.keys(data.years)
                    .map(Number)
                    .sort((a, b) => a - b);
                const fmt = (v) =>
                    new Intl.NumberFormat("es-PE", {
                        maximumFractionDigits: 0,
                    }).format(v);
                const sel = slide1Filters.year;

                // Cabecera
                let head = "<tr><th>AÑO</th>";
                years.forEach((y) => {
                    head += `<th class="${y === sel ? "col-selected" : ""}">${y}</th>`;
                });
                thead.innerHTML = head + "</tr>";

                // Calcular total y promedio por año según métrica
                const totalRow = [],
                    avgRow = [];
                years.forEach((y) => {
                    const serie =
                        (isMonto
                            ? data.years[y].monto
                            : data.years[y].cantidad) || [];
                    const vals = serie.filter((v) => v != null);
                    const total = vals.reduce((a, v) => a + v, 0);
                    const avg = vals.length ? total / vals.length : 0;
                    totalRow.push({ y, v: total });
                    avgRow.push({ y, v: Math.round(avg) });
                });

                const pref = isMonto ? "S/ " : "";
                let body = `<tr><td class="row-label-total"><i class="fa-solid fa-coins"></i> TOTAL</td>`;
                totalRow.forEach(
                    (c) =>
                        (body += `<td class="${c.y === sel ? "col-selected" : ""}">${pref}${fmt(c.v)}</td>`),
                );
                body += `</tr><tr><td class="row-label-avg"><i class="fa-solid fa-chart-simple"></i> PROMEDIO</td>`;
                avgRow.forEach(
                    (c) =>
                        (body += `<td class="${c.y === sel ? "col-selected" : ""}">${pref}${fmt(c.v)}</td>`),
                );
                body += "</tr>";
                tbody.innerHTML = body;
            }

            // TABLE GENERATION - SLIDE 2 (13 months rows)
            function renderTableSlide2(tableData) {
                const tbody = document
                    .getElementById("table-slide2")
                    .querySelector("tbody");
                tbody.innerHTML = "";

                tableData.months.forEach((month, index) => {
                    const venta = tableData.ventas[index];
                    const pres = tableData.presupuesto[index];

                    // Calculate compliance %
                    const pct = (venta / pres) * 100;
                    const pctFormatted = pct.toFixed(1) + "%";
                    const isGood = pct >= 100;

                    const complianceClass = isGood
                        ? "compliance-high"
                        : "compliance-low";
                    const statusBadge = isGood
                        ? `<span class="compliance-high"><i class="fa-solid fa-circle-check"></i> Meta Alcanzada</span>`
                        : `<span class="compliance-low"><i class="fa-solid fa-circle-exclamation"></i> En Desviación</span>`;

                    const rowHtml = `
          <tr>
            <td style="text-align: left; padding-left: 20px;"><strong>${month}</strong></td>
            <td>${venta.toFixed(1)}</td>
            <td>${pres.toFixed(1)}</td>
            <td class="${complianceClass}">${pctFormatted}</td>
            <td>${statusBadge}</td>
          </tr>
        `;
                    tbody.innerHTML += rowHtml;
                });
            }

            // FILTERS APPLICATOR (SIMULATION)
            function applyFilter(filterVal) {
                showToast(
                    "Actualizando Segmento",
                    `Cargando datos del canal para: ${filterVal.toUpperCase()}`,
                );

                const tableOuter = document.querySelector(
                    "#view-slide2 .table-outer-container",
                );
                const chartCards = document.querySelectorAll(
                    "#view-slide2 .chart-card",
                );

                // Show visual loading shimmer class
                tableOuter.classList.add("shimmer-bg");
                chartCards.forEach((c) => c.classList.add("shimmer-bg"));

                setTimeout(() => {
                    tableOuter.classList.remove("shimmer-bg");
                    chartCards.forEach((c) => c.classList.remove("shimmer-bg"));

                    // Generate simulated variations of Slide 2 data based on filter
                    const multiplier =
                        filterVal === "lima"
                            ? 0.75
                            : filterVal === "provincia"
                              ? 0.25
                              : 1.0;
                    const originalData = dashboardData.slide2;

                    const filteredAnnual = {
                        categories: originalData.chartAnnual.categories,
                        values: originalData.chartAnnual.values.map((v) =>
                            Number((v * multiplier).toFixed(1)),
                        ),
                        name: originalData.chartAnnual.name,
                    };

                    const filteredMonthly = {
                        categories: originalData.chartMonthly.categories,
                        series: [
                            {
                                name: originalData.chartMonthly.series[0].name,
                                values: originalData.chartMonthly.series[0].values.map(
                                    (v) => Number((v * multiplier).toFixed(1)),
                                ),

                                    (v) => Number((v * multiplier).toFixed(1)),

                            },

                    const filteredTable = {

                        ventas: originalData.table.ventas.map(
                            (v) => v * multiplier,

                        presupuesto: originalData.table.presupuesto.map(

                    // Redraw with filtered data
                    initChartsSlide2(filteredAnnual, filteredMonthly);

                            icon: "fa-solid fa-chart-line",
                            trendText: "Presupuesto canal",
                            trendUp: true,

                        {

                    cardsData.forEach((card) => {

                function updateRrhhVendedores() {
                    const selCiudad = window.rrhhFilters.ciudad;
                    const months = ["may-25", "jun-25", "jul-25", "ago-25", "sep-25", "oct-25", "nov-25", "dic-25", "ene-26", "feb-26", "mar-26", "abr-26", "may-26"];

                    };
                    const dotacionDataPeru = {
                        "LIMA": [180, 185, 175, 190, 195, 200, 210, 195, 205, 188, 198, 215, 220],
                        "AREQUIPA": [55, 58, 52, 60, 62, 65, 70, 60, 68, 58, 64, 72, 75],

                    const dotacionData = isPeru ? dotacionDataPeru : dotacionDataCol;

                    // Compute Totals
                    const totalVendedores = [];

                    for (let m = 0; m < months.length; m++) {

                            if (valD !== null) sumDot += valD;
                        });
                        totalVendedores.push(sumVend);
                        totalDotacion.push(sumDot);
                        totalPct.push(sumDot > 0 ? Math.round((sumVend / sumDot) * 100) : 0);

                    // Update KPIs

                    let lastV, lastD, lastP;

                        lastV = vendedoresData[selCiudad][mIdx] || 0;
                        lastD = dotacionData[selCiudad][mIdx] || 0;

                        .login-form-welcome {
                            text-align: center; margin: 20px 0 22px; font-size: 14px;
                            color: rgba(255,255,255,0.55); font-weight: 400;
                        }

                        .login-form-group { margin-bottom: 14px; }
                        .login-form-label {
                            display: block; font-size: 11px; font-weight: 600; color: rgba(255, 255, 255, 0.5);
                            margin-bottom: 5px; letter-spacing: 0.3px;
                        }
                        .login-form-input-wrap {
                            display: flex; align-items: center; gap: 10px;
                            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08);
                            border-radius: 11px; padding: 0 12px; transition: all 0.2s;
                        }
                        .login-form-input-wrap:focus-within {
                            border-color: rgba(16, 185, 129, 0.6);
                            background: rgba(255, 255, 255, 0.08);
                            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
                        }
                        .login-form-input-wrap i { color: rgba(255, 255, 255, 0.3); font-size: 14px; flex-shrink: 0; }
                        .login-form-input {
                            flex: 1; border: none; outline: none; background: transparent;
                            padding: 12px 0; font-size: 13px; color: #ffffff;
                            font-family: 'Inter', sans-serif;
                        }
                        .login-form-input::placeholder { color: rgba(255, 255, 255, 0.2); }
                        .login-toggle-pass {
                            background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer;
                            font-size: 13px; padding: 4px; transition: color 0.2s;
                        }
                        .login-toggle-pass:hover { color: rgba(255,255,255,0.6); }

                        .login-form-options {
                            display: flex; justify-content: space-between; align-items: center;
                            margin: 4px 0 20px; font-size: 11px;
                        }
                        .login-form-remember {
                            display: flex; align-items: center; gap: 5px; color: rgba(255,255,255,0.45); cursor: pointer;
                        }
                        .login-form-remember input[type="checkbox"] {
                            accent-color: #10b981; width: 13px; height: 13px;
                        }
                        .login-form-forgot {
                            color: rgba(16, 185, 129, 0.85); text-decoration: none; font-weight: 500;
                            cursor: pointer; transition: color 0.2s;
                        }
                        .login-form-forgot:hover { color: #34d399; }

                        .login-form-submit {
                            width: 100%; padding: 13px; border: none; border-radius: 11px;
                            background: linear-gradient(135deg, #10b981, #059669);
                            color: #ffffff; font-size: 14px; font-weight: 600; cursor: pointer;
                            font-family: 'Inter', sans-serif;
                            box-shadow: 0 3px 12px rgba(16, 185, 129, 0.35);
                            transition: all 0.2s; position: relative; overflow: hidden;
                        }
                        .login-form-submit:hover:not(:disabled) {
                            transform: translateY(-1px); box-shadow: 0 5px 18px rgba(16, 185, 129, 0.45);
                        }
                        .login-form-submit:active:not(:disabled) { transform: translateY(0); }
                        .login-form-submit:disabled { opacity: 0.8; cursor: not-allowed; }
                        .login-form-submit.success {
                            background: linear-gradient(135deg, #10b981, #059669) !important;
                        }

                        .login-form-divider {
                            display: flex; align-items: center; gap: 10px; margin: 16px 0;
                            color: rgba(255,255,255,0.2); font-size: 10px;
                        }
                        .login-form-divider::before, .login-form-divider::after {
                            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
                        }
                        .login-sso-btn {
                            width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.08);
                            border-radius: 10px; background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.55);
                            font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif;
                            display: flex; align-items: center; justify-content: center; gap: 8px;
                            transition: all 0.2s;
                        }
                        .login-sso-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }

                        .login-form-footer {
                            text-align: center; margin-top: 18px; font-size: 10px;
                            color: rgba(255,255,255,0.25);
                        }
                        .login-form-footer a { color: rgba(14, 140, 155, 0.6); text-decoration: none; cursor: pointer; }
                        .login-form-footer a:hover { color: #0E8C9B; }

                        .login-particles {
                            position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
                        }
                        .login-particle {
                            position: absolute; border-radius: 50%; background: rgba(255,255,255,0.025);
                            animation: floatParticle 25s infinite linear;
                        }
                        @keyframes floatParticle {
                            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
                            8% { opacity: 1; }
                            92% { opacity: 1; }
                            100% { transform: translateY(-80px) rotate(720deg); opacity: 0; }
                        }
                        @keyframes inputShake {
                            0%, 100% { transform: translateX(0); }
                            20% { transform: translateX(-6px); }
                            40% { transform: translateX(6px); }
                            60% { transform: translateX(-4px); }
                            80% { transform: translateX(4px); }
                        }
                        .input-shake { animation: inputShake 0.4s ease; }
                    </style>

                    <div class="login-sim-card">
                        <div class="login-sim-header">
                            <h3><i class="fa-solid fa-fingerprint" style="color: #0E8C9B; margin-right: 8px;"></i>Simulador de Login</h3>
                            <p>Previsualiza la experiencia de inicio de sesión corporativo. Haz clic en la vista previa o en el botón para abrir la simulación completa.</p>
                        </div>

                        <!-- Mini Preview (clickable) -->
                        <div class="login-sim-preview" id="login-preview-click">
                            <div class="login-mini-form">
                                <div class="login-mini-logo-wrap">
                                    <img src="logo.png" alt="Logo" />
                                </div>
                                <div class="mini-sub">Enterprise BI Portal</div>
                                <input class="login-mini-input" type="text" placeholder="usuario@maqui.pe" disabled />
                                <input class="login-mini-input" type="password" placeholder="••••••••" disabled />
                                <div class="login-mini-btn">Iniciar Sesión</div>
                            </div>
                            <div class="preview-overlay-hint">
                                <i class="fa-solid fa-expand"></i> Clic para abrir
                            </div>
                        </div>

                        <!-- Launch Button -->
                        <div class="login-sim-actions">
                            <button class="login-sim-launch" id="btn-launch-login">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i> Abrir Simulación
                            </button>
                        </div>

                        <!-- Info pills -->
                        <div class="login-sim-info">
                            <div class="login-info-item">
                                <i class="fa-solid fa-shield-halved"></i>
                                <span>MFA Activo</span>
                            </div>
                            <div class="login-info-item">
                                <i class="fa-solid fa-palette"></i>
                                <span>Branding Corp.</span>
                            </div>
                            <div class="login-info-item">
                                <i class="fa-solid fa-mobile-screen-button"></i>
                                <span>Responsive</span>
                            </div>
                        </div>
                    </div>

                    <!-- Full-screen Login Overlay -->
                    <div class="login-overlay" id="login-overlay">
                        <div class="login-particles" id="login-particles"></div>
                        <button class="login-overlay-close" id="login-overlay-close" title="Cerrar">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <div class="login-form-container">
                            <div class="login-form-logo">
                                <img src="logo.png" alt="Maqui Logo" class="login-form-logo-img" />
                                <div class="logo-subtitle">Enterprise BI Portal</div>
                            </div>

                            <div class="login-form-welcome">Bienvenido de vuelta</div>

                            <div class="login-form-group">
                                <label class="login-form-label">Correo corporativo</label>
                                <div class="login-form-input-wrap" id="email-wrap">
                                    <i class="fa-solid fa-envelope" style="color: #38bdf8;"></i>
                                    <input class="login-form-input" type="email" placeholder="nombre@maqui.pe" id="login-sim-email" autocomplete="off" />
                                </div>
                            </div>
                            <div class="login-form-group">
                                <label class="login-form-label">Contraseña</label>
                                <div class="login-form-input-wrap" id="pass-wrap">
                                    <i class="fa-solid fa-lock" style="color: #10b981;"></i>
                                    <input class="login-form-input" type="password" placeholder="••••••••" id="login-sim-pass" />
                                    <button class="login-toggle-pass" id="toggle-pass" type="button" title="Mostrar contraseña">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="login-form-options">
                                <label class="login-form-remember">
                                    <input type="checkbox" checked /> Recordar sesión
                                </label>
                                <span class="login-form-forgot" onclick="showToast('Recuperar Contraseña', 'Se ha enviado un enlace de recuperación (simulación).')">¿Olvidaste tu contraseña?</span>
                            </div>

                            <button class="login-form-submit" id="login-sim-submit">
                                Iniciar Sesión
                            </button>

                            <div class="login-form-divider">o continuar con</div>
                            <button class="login-sso-btn" onclick="showToast('SSO', 'Inicio de sesión con Microsoft Azure AD (simulación).')">
                                <div style="display: inline-grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 14px; height: 14px; margin-right: 8px; vertical-align: middle;">
                                    <div style="width: 6px; height: 6px; background-color: #f25022;"></div>
                                    <div style="width: 6px; height: 6px; background-color: #7fba00;"></div>
                                    <div style="width: 6px; height: 6px; background-color: #00a4ef;"></div>
                                    <div style="width: 6px; height: 6px; background-color: #ffb900;"></div>
                                </div>
                                Microsoft SSO
                            </button>

                            <div class="login-form-footer">
                                © 2026 Maqui Corp. · <a onclick="showToast('Soporte', 'Contactar soporte@maqui.pe')">Soporte TI</a>
                            </div>
                        </div>
                    </div>
                `;

                // Generate floating particles with color variety
                const particleContainer = document.getElementById('login-particles');
                if (particleContainer) {
                    const colors = [
                        'rgba(16, 185, 129, 0.04)', // emerald
                        'rgba(14, 140, 155, 0.04)', // teal
                        'rgba(234, 179, 8, 0.035)', // gold/yellow
                        'rgba(244, 63, 94, 0.03)',  // rose
                        'rgba(255, 255, 255, 0.03)' // white
                    ];
                    for (let i = 0; i < 15; i++) {
                        const p = document.createElement('div');
                        p.className = 'login-particle';
                        const size = Math.random() * 60 + 15;
                        p.style.width = size + 'px';
                        p.style.height = size + 'px';
                        p.style.left = Math.random() * 100 + '%';
                        p.style.background = colors[Math.floor(Math.random() * colors.length)];
                        p.style.animationDelay = Math.random() * 25 + 's';
                        p.style.animationDuration = (Math.random() * 18 + 18) + 's';
                        particleContainer.appendChild(p);
                    }
                }

                // Open overlay from both preview and button
                const launchBtn = document.getElementById('btn-launch-login');
                const previewClick = document.getElementById('login-preview-click');
                const overlay = document.getElementById('login-overlay');
                const closeBtn = document.getElementById('login-overlay-close');

                const openOverlay = () => {
                    if (overlay) {
                        overlay.classList.add('active');
                        document.body.style.overflow = 'hidden';
                        const emailInput = document.getElementById('login-sim-email');
                        if (emailInput) setTimeout(() => emailInput.focus(), 400);
                    }
                };

                if (launchBtn) launchBtn.addEventListener('click', openOverlay);
                if (previewClick) previewClick.addEventListener('click', openOverlay);

                if (closeBtn && overlay) {
                    closeBtn.addEventListener('click', () => {
                        overlay.classList.remove('active');
                        document.body.style.overflow = '';
                    });
                }

                // Toggle password visibility
                const togglePass = document.getElementById('toggle-pass');
                const passInput = document.getElementById('login-sim-pass');
                if (togglePass && passInput) {
                    togglePass.addEventListener('click', () => {
                        const isPassword = passInput.type === 'password';
                        passInput.type = isPassword ? 'text' : 'password';
                        togglePass.innerHTML = isPassword
                            ? '<i class="fa-solid fa-eye-slash"></i>'
                            : '<i class="fa-solid fa-eye"></i>';
                    });
                }

                // Simulate login with validation
                const submitBtn = document.getElementById('login-sim-submit');
                if (submitBtn) {
                    submitBtn.addEventListener('click', () => {
                        const email = document.getElementById('login-sim-email');
                        const pass = document.getElementById('login-sim-pass');
                        const emailWrap = document.getElementById('email-wrap');
                        const passWrap = document.getElementById('pass-wrap');
                        const emailVal = email ? email.value.trim() : '';
                        const passVal = pass ? pass.value.trim() : '';

                        // Shake empty fields
                        let hasError = false;
                        if (!emailVal && emailWrap) {
                            emailWrap.classList.add('input-shake');
                            emailWrap.style.borderColor = 'rgba(239, 68, 68, 0.5)';
                            setTimeout(() => { emailWrap.classList.remove('input-shake'); emailWrap.style.borderColor = ''; }, 500);
                            hasError = true;
                        }
                        if (!passVal && passWrap) {
                            passWrap.classList.add('input-shake');
                            passWrap.style.borderColor = 'rgba(239, 68, 68, 0.5)';
                            setTimeout(() => { passWrap.classList.remove('input-shake'); passWrap.style.borderColor = ''; }, 500);
                            hasError = true;
                        }
                        if (hasError) {
                            showToast('Campos requeridos', 'Ingrese correo y contraseña para continuar.');
                            return;
                        }

                        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i> Autenticando...';
                        submitBtn.disabled = true;

                        setTimeout(() => {
                            submitBtn.innerHTML = '<i class="fa-solid fa-circle-check" style="margin-right:6px;"></i> ¡Acceso Concedido!';
                            submitBtn.classList.add('success');
                            showToast('Login Exitoso', 'Bienvenido, ' + emailVal + ' — simulación completada.');

                            setTimeout(() => {
                                overlay.classList.remove('active');
                                document.body.style.overflow = '';
                                submitBtn.innerHTML = 'Iniciar Sesión';
                                submitBtn.classList.remove('success');
                                submitBtn.disabled = false;
                                if (email) email.value = '';
                                if (pass) pass.value = '';
                            }, 1800);
                        }, 1400);
                    });
                }

                // Submit on Enter key
                const handleEnter = (e) => { if (e.key === 'Enter' && submitBtn) submitBtn.click(); };
                const emailEl = document.getElementById('login-sim-email');
                const passEl = document.getElementById('login-sim-pass');
                if (emailEl) emailEl.addEventListener('keydown', handleEnter);
                if (passEl) passEl.addEventListener('keydown', handleEnter);
            }

            function clearNotifications() {
                const list = document.getElementById("notification-list");
                const badge = document.getElementById("alert-badge");
                if (list) {
                    list.innerHTML = `
          <div style="padding: 20px; text-align: center; font-size: 13px; color: var(--color-turquoise-dark); opacity: 0.6;">
            <i class="fa-solid fa-envelope-open" style="font-size: 20px; margin-bottom: 8px; display: block; color: var(--color-turquoise-medium);"></i>
            No tienes notificaciones pendientes.
          </div>
        `;
                }
                if (badge) badge.style.display = "none";
                showToast(
                    "Bandeja de Entrada limpia",
                    "Todas las alertas corporativas marcadas como leídas.",
                );
            }
        </script>
    </body>
</html>
