<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Maqui - Enterprise BI Portal</title>
        <!-- Google Fonts: Inter -->
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <!-- FontAwesome Icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <!-- Chart.js CDN -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <!-- Plugin de etiquetas de datos -->
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

        <style>
            /* VARIABLES DE DISEÑO (PALETA DE COLORES Y NEUMORFISMO) */
            :root {
                --color-logo-red: #f01515;
                --color-turquoise-medium: #008296;
                --color-turquoise-dark: #025763;
                --color-bg-gray: #f0f0f0; /* Plomo muy claro para botones */
                --color-card-gray: #ffffff; /* Blanco para tarjetas */

                /* Sombras suaves (blanco atenuado para evitar el "resplandor") */
                --shadow-light: rgba(255, 255, 255, 0.6);
                --shadow-dark: rgba(0, 0, 0, 0.09);

                --shadow-raised:
                    5px 5px 12px var(--shadow-dark),
                    -4px -4px 10px var(--shadow-light);
                --shadow-raised-sm:
                    3px 3px 7px var(--shadow-dark),
                    -2px -2px 6px var(--shadow-light);
                --shadow-sunken:
                    inset 4px 4px 9px var(--shadow-dark),
                    inset -3px -3px 7px var(--shadow-light);
                --shadow-sunken-sm:
                    inset 2px 2px 5px var(--shadow-dark),
                    inset -2px -2px 4px var(--shadow-light);

                --transition-speed: 0.3s;
            }

            /* RESET & BASE STYLES */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: #ffffff;
                font-family: "Inter", sans-serif;
                color: var(--color-turquoise-dark);
                display: flex;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* NAV / SIDEBAR */
            .sidebar {
                width: 280px;
                background-color: #ffffff;
                box-shadow:
                    8px 0 24px var(--shadow-dark),
                    -8px 0 24px var(--shadow-light);
                border-radius: 0 24px 24px 0;
                padding: 35px 25px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                z-index: 100;
                transition: transform var(--transition-speed) ease;
            }

            .sidebar-top {
                display: flex;
                flex-direction: column;
                gap: 22px;
            }

            /* Logo Area */
            .logo-container {
                display: flex;
                align-items: center;
                gap: 12px;
                padding-left: 10px;
            }

            .logo-img {
                height: 62px;
                width: auto;
                max-width: 100%;
                object-fit: contain;
                filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.1));
            }

            .logo-icon {
                font-size: 26px;
                color: var(--color-turquoise-medium);
                filter: drop-shadow(2px 2px 4px var(--shadow-dark));
            }

            .logo-text {
                font-size: 20px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                letter-spacing: -0.5px;
            }

            /* Country Selector */
            .country-selector {
                border: 2px solid rgba(0, 130, 150, 0.2);
                border-radius: 16px;
                padding: 14px 18px;
                margin-top: 8px;
                margin-bottom: 8px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                background-color: var(--color-card-gray);
                box-shadow: var(--shadow-raised-sm);
            }

            .country-selector legend {
                padding: 0 8px;
                font-size: 12px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
            }

            .country-option {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 13.5px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
                cursor: pointer;
                user-select: none;
                position: relative;
            }

            .country-option input {
                position: absolute;
                opacity: 0;
                cursor: pointer;
                height: 0;
                width: 0;
            }

            .radio-custom {
                height: 16px;
                width: 16px;
                background-color: var(--color-bg-gray);
                border-radius: 50%;
                box-shadow: var(--shadow-sunken-sm);
                display: inline-block;
                position: relative;
                transition: all 0.2s ease;
            }

            .country-option input:checked ~ .radio-custom {
                background-color: var(--color-card-gray);
                box-shadow: var(--shadow-raised-sm);
            }

            .radio-custom::after {
                content: "";
                position: absolute;
                display: none;
                top: 4px;
                left: 4px;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: var(--color-turquoise-medium);
            }

            .country-option input:checked ~ .radio-custom::after {
                display: block;
            }

            /* Accordion Navigation */
            .accordion-nav {
                display: flex;
                flex-direction: column;
                gap: 10px;
                overflow-y: auto;
                max-height: calc(100vh - 260px);
                padding-right: 5px;
                padding-bottom: 20px;
                flex: 1;
            }

            .menu-category {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }

            .category-header {
                width: 100%;
                background: none;
                border: none;
                padding: 10px 14px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14.5px;
                font-weight: 700;
                color: var(--color-turquoise-dark);
                cursor: pointer;
                text-align: left;
                border-radius: 12px;
                transition: background-color var(--transition-speed);
            }

            .category-header:hover {
                background-color: rgba(0, 130, 150, 0.06);
            }

            .category-header .arrow-icon {
                font-size: 10px;
                transition: transform var(--transition-speed) ease;
                color: var(--color-turquoise-medium);
            }

            .menu-category.expanded .category-header .arrow-icon {
                transform: rotate(90deg);
            }

            .category-list {
                list-style: none;
                display: none;
                flex-direction: column;
                gap: 4px;
                padding-left: 16px;
                border-left: 2px dashed rgba(0, 130, 150, 0.15);
                margin-left: 8px;
            }

            .menu-category.expanded .category-list {
                display: flex;
            }

            .sub-btn {
                width: 100%;
                background: none;
                border: none;
                padding: 8px 12px;
                font-size: 13px;
                font-weight: 500;
                color: var(--color-turquoise-medium);
                text-align: left;
                cursor: pointer;
                border-radius: 10px;
                transition: all var(--transition-speed) ease;
                outline: none;
            }

            .sub-btn:hover {
                color: var(--color-turquoise-dark);
                background-color: rgba(0, 130, 150, 0.05);
                padding-left: 15px;
            }

            .sub-btn.active {
                font-weight: 700;
                color: var(--color-turquoise-dark);
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-sunken-sm);
            }

            /* Nested Category (Otros) */
            .nested-category {
                display: flex;
                flex-direction: column;
                gap: 3px;
                margin-top: 4px;
            }

            .nested-category-header {
                width: 100%;
                background: none;
                border: none;
                padding: 8px 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-medium);
                cursor: pointer;
                text-align: left;
                border-radius: 10px;
                transition: all var(--transition-speed) ease;
                outline: none;
            }

            .nested-category-header:hover {
                color: var(--color-turquoise-dark);
                background-color: rgba(0, 130, 150, 0.05);
            }

            .nested-category-header .nested-arrow-icon {
                font-size: 9px;
                transition: transform var(--transition-speed) ease;
                color: var(--color-turquoise-medium);
            }

            .nested-category.expanded .nested-category-header .nested-arrow-icon {
                transform: rotate(90deg);
            }

            .nested-category-list {
                list-style: none;
                display: none;
                flex-direction: column;
                gap: 4px;
                padding-left: 14px;
                border-left: 1.5px dashed rgba(0, 130, 150, 0.12);
                margin-left: 6px;
            }

            .nested-category.expanded .nested-category-list {
                display: flex;
            }

            /* Sub-tabs bar styling */
            .sub-tabs-bar {
                display: flex;
                gap: 12px;
                background-color: var(--color-card-gray);
                padding: 10px 18px;
                border-radius: 16px;
                box-shadow: var(--shadow-raised-sm);
                width: 100%;
                overflow-x: auto;
                margin-bottom: 5px;
            }

            .sub-tab-btn {
                background: none;
                border: none;
                padding: 8px 15px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-medium);
                cursor: pointer;
                transition: all var(--transition-speed) ease;
                white-space: nowrap;
            }

            .sub-tab-btn:hover {
                color: var(--color-turquoise-dark);
                background-color: rgba(0, 130, 150, 0.06);
            }

            .sub-tab-btn.active {
                background-color: var(--color-bg-gray);
                color: var(--color-turquoise-dark);
                box-shadow: var(--shadow-sunken-sm);
            }

            /* Footer Utilities */
            .sidebar-footer {
                position: sticky;
                bottom: -35px; /* offset the sidebar's padding-bottom */
                background-color: #ffffff;
                padding-top: 5px;
                padding-bottom: 5px;
                margin-top: auto;
                z-index: 10;
                box-shadow: 0 -15px 15px -5px rgba(255, 255, 255, 0.95);
            }

            .footer-divider {
                border: none;
                height: 1.5px;
                background-color: rgba(0, 130, 150, 0.12);
                margin: 4px 0 8px 0;
            }

            .btn-footer-utility {
                width: 100%;
                background: none;
                border: none;
                padding: 10px 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
                cursor: pointer;
                border-radius: 12px;
                transition: all var(--transition-speed) ease;
                text-align: left;
            }

            .btn-footer-utility:hover:not(:disabled) {
                background-color: rgba(0, 130, 150, 0.05);
            }

            .btn-footer-utility:disabled {
                opacity: 0.45;
                cursor: not-allowed;
            }

            .utility-left {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .utility-right {
                font-size: 10.5px;
                font-weight: 500;
                color: var(--color-turquoise-medium);
                opacity: 0.85;
            }

            .check-icon {
                color: var(--color-turquoise-medium);
                font-size: 13px;
            }

            .dot-icon {
                color: var(--color-logo-red);
                font-size: 9px;
            }

            .dot-disabled {
                display: inline-block;
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background-color: #a0a0a0;
            }

            /* MAIN CONTENT */
            .main-content {
                flex: 1;
                margin-left: 280px;
                padding: 40px;
                display: flex;
                flex-direction: column;
                gap: 35px;
                box-sizing: border-box;
                max-width: calc(100% - 280px);
                min-width: 0;
                min-height: 100vh;
                transition:
                    margin-left var(--transition-speed) ease,
                    max-width var(--transition-speed) ease;
            }

            /* HEADER */
            .header-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
            }

            .header-title-area h1 {
                font-size: 24px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                margin-bottom: 5px;
            }

            .header-title-area p {
                font-size: 14px;
                color: var(--color-turquoise-dark);
                opacity: 0.8;
                font-weight: 500;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            /* Notifications */
            .notification-bell-container {
                position: relative;
            }

            .notification-bell {
                width: 48px;
                height: 48px;
                background-color: var(--color-bg-gray);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: var(--shadow-raised-sm);
                cursor: pointer;
                color: var(--color-turquoise-medium);
                transition: all var(--transition-speed) ease;
                position: relative;
            }

            .notification-bell:hover {
                box-shadow: var(--shadow-sunken-sm);
                color: var(--color-logo-red);
            }

            .notification-badge {
                position: absolute;
                top: 13px;
                right: 13px;
                width: 9px;
                height: 9px;
                background-color: var(--color-logo-red);
                border-radius: 50%;
                box-shadow: 0 0 8px var(--color-logo-red);
            }

            .notifications-dropdown {
                position: absolute;
                top: 60px;
                right: 0;
                width: 320px;
                background-color: var(--color-card-gray);
                border-radius: 20px;
                box-shadow:
                    8px 8px 24px var(--shadow-dark),
                    -8px -8px 24px var(--shadow-light);
                padding: 20px;
                display: none;
                flex-direction: column;
                gap: 15px;
                z-index: 200;
                transform-origin: top right;
                animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .notifications-dropdown.active {
                display: flex;
            }

            .dropdown-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                border-bottom: 1px solid rgba(2, 87, 99, 0.1);
                padding-bottom: 8px;
            }

            .dropdown-items {
                display: flex;
                flex-direction: column;
                gap: 10px;
                max-height: 250px;
                overflow-y: auto;
            }

            .dropdown-item {
                padding: 10px 12px;
                border-radius: 12px;
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-raised-sm);
                display: flex;
                gap: 10px;
                font-size: 12px;
                line-height: 1.4;
                cursor: pointer;
                transition: box-shadow var(--transition-speed) ease;
            }

            .dropdown-item:hover {
                box-shadow: var(--shadow-sunken-sm);
            }

            .dropdown-item i {
                color: var(--color-logo-red);
                margin-top: 2px;
            }

            .dropdown-item-content {
                flex: 1;
            }

            .dropdown-item-time {
                font-size: 10px;
                opacity: 0.6;
                margin-top: 4px;
                display: block;
            }

            /* Profile Card */
            .profile-card {
                padding: 8px 16px;
                border-radius: 16px;
                background-color: var(--color-bg-gray);
                box-shadow: var(--shadow-raised-sm);
                display: flex;
                align-items: center;
                gap: 12px;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
            }

            .profile-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background-color: var(--color-turquoise-medium);
                color: #ffffff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                box-shadow: var(--shadow-raised-sm);
            }

            /* METRICS SECTION */
            .metrics-grid {
                display: none !important;
            }

            .metric-card {
                background-color: var(--color-card-gray);
                border-radius: 22px;
                padding: 22px;
                display: flex;
                flex-direction: column;
                gap: 12px;
                box-shadow: var(--shadow-raised);
                transition:
                    transform var(--transition-speed) ease,
                    box-shadow var(--transition-speed) ease;
                position: relative;
                overflow: hidden;
            }

            .metric-card:hover {
                transform: translateY(-4px);
            }

            .metric-card:active {
                box-shadow: var(--shadow-sunken);
                transform: translateY(0);
            }

            .metric-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .metric-title {
                font-size: 12px;
                font-weight: 700;
                color: var(--color-turquoise-dark);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                opacity: 0.8;
            }

            .metric-icon-wrapper {
                width: 40px;
                height: 40px;
                background-color: var(--color-bg-gray);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: var(--shadow-sunken-sm);
                color: var(--color-turquoise-medium);
                font-size: 16px;
            }

            .metric-value {
                font-size: 26px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                margin: 2px 0;
            }

            .metric-footer {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                font-weight: 500;
            }

            .trend-badge {
                display: flex;
                align-items: center;
                gap: 3px;
                font-weight: 700;
            }

            .trend-up {
                color: var(--color-turquoise-medium);
            }

            .trend-down {
                color: var(--color-logo-red);
            }

            /* FILTERS SECTION */
            .filter-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: var(--color-card-gray);
                padding: 15px 25px;
                border-radius: 20px;
                box-shadow: var(--shadow-raised);
            }

            .filter-info {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 14px;
                font-weight: 600;
            }

            .filter-info i {
                color: var(--color-turquoise-medium);
            }

            .filter-actions {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            /* Neumorphic Select */
            .select-wrapper {
                position: relative;
            }

            .select-neumorphic {
                appearance: none;
                background-color: #ffffff;
                color: var(--color-turquoise-medium);
                border: 1.5px solid rgba(90, 100, 110, 0.6);
                padding: 12px 45px 12px 20px;
                border-radius: 14px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                outline: none;
                transition: all var(--transition-speed) ease;
            }

            .select-neumorphic:focus {
                border-color: rgba(12, 100, 112, 0.4);
            }

            .select-wrapper::after {
                content: "\f107";
                font-family: "Font Awesome 6 Free";
                font-weight: 900;
                position: absolute;
                right: 20px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--color-turquoise-medium);
                pointer-events: none;
                transition: transform var(--transition-speed) ease;
            }

            /* CENTRAL SECTION (CHARTS & ACTION BUTTONS) */
            .charts-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 35px;
                width: 100%;
            }

            .charts-grid.two-columns {
                grid-template-columns: repeat(2, 1fr);
            }

            .chart-card {
                background-color: #ffffff;
                border: 1.5px solid rgba(90, 100, 110, 0.6);
                border-radius: 24px;
                padding: 30px;
                box-shadow: var(--shadow-raised);
                display: flex;
                flex-direction: column;
                gap: 25px;
                position: relative;
                min-width: 0;
            }

            .chart-card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .chart-card-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .chart-card-title i {
                color: var(--color-turquoise-dark);
            }

            .chart-canvas-wrapper {
                position: relative;
                width: 100%;
                height: 340px;
                min-width: 0;
                overflow: hidden;
            }

            /* BUTTONS */
            .btn-primary {
                background-color: var(--color-logo-red);
                color: #ffffff;
                border: none;
                padding: 12px 24px;
                border-radius: 16px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
                box-shadow:
                    4px 4px 10px rgba(200, 200, 200, 0.7),
                    -4px -4px 10px rgba(255, 255, 255, 0.9);
                transition: all var(--transition-speed) ease;
                outline: none;
            }

            .btn-primary:hover {
                background-color: #d61212;
                transform: translateY(-2px);
                box-shadow:
                    6px 6px 14px rgba(200, 200, 200, 0.8),
                    -6px -6px 14px rgba(255, 255, 255, 1);
            }

            .btn-primary:active {
                transform: translateY(0);
                box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.2);
            }

            /* DATA TABLES SECTION */
            .table-card {
                background-color: #ffffff;
                border: 1.5px solid rgba(90, 100, 110, 0.6);
                border-radius: 24px;
                padding: 30px;
                box-shadow: var(--shadow-raised);
                display: flex;
                flex-direction: column;
                gap: 20px;
                min-width: 0;
            }

            .table-card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .table-card-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--color-turquoise-medium);
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .table-outer-container {
                width: 100%;
                overflow-x: auto;
                border-radius: 18px;
                background-color: #ffffff;
                border: 1.5px solid rgba(90, 100, 110, 0.6);
                padding: 12px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: center;
                font-size: 13px;
                color: var(--color-turquoise-dark);
            }

            #table-slide1 {
                min-width: 800px;
            }

            thead th {
                background-color: rgba(0, 130, 150, 0.06);
                color: var(--color-turquoise-medium);
                font-weight: 700;
                padding: 14px 10px;
                text-transform: uppercase;
                font-size: 11px;
                letter-spacing: 0.5px;
                position: sticky;
                top: 0;
            }

            thead th:first-child {
                border-radius: 12px 0 0 12px;
                text-align: left;
                padding-left: 20px;
            }

            thead th:last-child {
                border-radius: 0 12px 12px 0;
            }

            tbody tr {
                transition: background-color var(--transition-speed) ease;
            }

            tbody tr:hover {
                background-color: rgba(0, 130, 150, 0.03);
            }

            tbody td {
                padding: 14px 10px;
                border-bottom: 1px solid rgba(0, 130, 150, 0.12);
                font-weight: 500;
            }

            tbody td:first-child {
                text-align: left;
                padding-left: 20px;
                font-weight: 600;
            }

            tbody tr:last-child td {
                border-bottom: none;
            }

            /* Compliance color decorators */
            .compliance-high {
                color: var(--color-turquoise-medium);
                font-weight: 700;
            }

            .compliance-low {
                color: var(--color-logo-red);
                font-weight: 700;
            }

            /* LOADING SHIMMER EFFECT */
            .shimmer-bg {
                background: linear-gradient(
                    90deg,
                    var(--color-card-gray) 25%,
                    var(--color-bg-gray) 50%,
                    var(--color-card-gray) 75%
                );
                background-size: 200% 100%;
                animation: shimmer 1.5s infinite linear;
            }

            @keyframes shimmer {
                to {
                    background-position: -200% 0;
                }
            }

            /* TOAST NOTIFICATION */
            .toast-notification {
                position: fixed;
                bottom: 30px;
                right: 30px;
                background-color: var(--color-card-gray);
                border-left: 5px solid var(--color-logo-red);
                padding: 15px 25px;
                border-radius: 12px;
                box-shadow:
                    8px 8px 20px rgba(0, 0, 0, 0.15),
                    -8px -8px 20px #ffffff;
                display: flex;
                align-items: center;
                gap: 15px;
                z-index: 1000;
                transform: translateY(100px);
                opacity: 0;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .toast-notification.active {
                transform: translateY(0);
                opacity: 1;
            }

            .toast-icon {
                color: var(--color-logo-red);
                font-size: 20px;
            }

            .toast-text h4 {
                font-size: 14px;
                font-weight: 700;
                color: var(--color-turquoise-dark);
                margin-bottom: 2px;
            }

            .toast-text p {
                font-size: 12px;
                opacity: 0.8;
            }

            /* ANIMATIONS */
            @keyframes popIn {
                0% {
                    opacity: 0;
                    transform: scale(0.8) translateY(-10px);
                }
                100% {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
            }

            /* VIEW MANAGEMENT */
            .dashboard-view {
                display: none;
                flex-direction: column;
                gap: 35px;
                animation: popIn 0.35s ease;
            }

            .dashboard-view.active {
                display: flex;
            }

            /* ===== MEJORAS DE COLOR Y FILTROS (SLIDE 1) ===== */

            /* Acento de color en la barra lateral y header */
            .logo-text {
                background: linear-gradient(90deg, #008296, #2a9d8f);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .header-title-area h1 {
                background: linear-gradient(90deg, #e2674f, #0e8c9b);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                font-size: 23px;
            }

            /* Tarjetas de métricas con borde superior de color */
            .metric-card {
                border-top: 4px solid var(--accent, #008296);
            }
            .metric-card::after {
                content: "";
                position: absolute;
                top: -40px;
                right: -40px;
                width: 110px;
                height: 110px;
                border-radius: 50%;
                background: var(--accent, #008296);
                opacity: 0.06;
            }

            /* Filtros del slide 1 reubicados en la cabecera (arriba a la derecha) */
            .header-bar .header-title-area {
                flex: 1 1 auto;
                min-width: 0;
            }
            .slide1-header-filters {
                display: flex;
                align-items: flex-end;
                justify-content: flex-end;
                flex-wrap: nowrap;
                flex: 0 0 auto;
                gap: 14px;
            }
            .slide1-header-filters .filter-group > label {
                font-size: 11px;
                letter-spacing: 0.4px;
                white-space: nowrap;
            }
            .slide1-header-filters .select-neumorphic {
                padding: 12px 38px 12px 16px;
                font-size: 14px;
                border-radius: 14px;
            }
            .slide1-header-filters .select-wrapper::after {
                right: 16px;
                font-size: 13px;
            }
            .filter-group {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .filter-group > label {
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--color-turquoise-medium);
                padding-left: 4px;
            }

            /* Píldoras de leyenda del gráfico (como en el reporte) */
            .chart-legend {
                display: flex;
                gap: 22px;
                flex-wrap: wrap;
            }
            .legend-pill {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                font-weight: 600;
                color: var(--color-turquoise-dark);
            }
            .legend-swatch {
                width: 26px;
                height: 12px;
                border-radius: 4px;
                box-shadow: var(--shadow-raised-sm);
            }
            .legend-swatch.line {
                height: 4px;
                border-radius: 2px;
            }

            /* Resaltar columna del año seleccionado en la tabla resumen */
            .col-selected {
                background: rgba(0, 130, 150, 0.12) !important;
                color: var(--color-turquoise-dark) !important;
                font-weight: 800 !important;
            }
            thead th.col-selected {
                background: var(--color-turquoise-medium) !important;
                color: #fff !important;
            }

            .row-label-total {
                color: #0e8c9b;
            }
            .row-label-avg {
                color: #c98a3a;
            }

            /* ===== NAV CON 26 ÍTEMS (scroll) ===== */
            .nav-list {
                gap: 9px;
                max-height: calc(100vh - 150px);
                overflow-y: auto;
                overflow-x: hidden;
                padding: 4px 6px 4px 2px;
                margin: -4px 0;
            }
            .nav-list::-webkit-scrollbar {
                width: 7px;
            }
            .nav-list::-webkit-scrollbar-thumb {
                background: rgba(14, 140, 155, 0.35);
                border-radius: 8px;
            }
            .nav-list::-webkit-scrollbar-track {
                background: transparent;
            }
            .nav-btn {
                padding: 11px 16px;
                font-size: 12.5px;
                gap: 12px;
            }
            .nav-btn span {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* ===== TARJETA DE IMAGEN (diapositivas 9-26) ===== */
            .image-card {
                background-color: var(--color-card-gray);
                border-radius: 24px;
                padding: 16px;
                box-shadow: var(--shadow-raised);
            }
            .image-card img {
                width: 100%;
                height: auto;
                display: block;
                border-radius: 14px;
                background: #ffffff;
            }

            /* ===== TABLA SEGUIMIENTO (slide 9) ===== */
            .seg-table-wrapper {
                overflow-x: auto;
                border-radius: 14px;
                background-color: #ffffff;
                border: 1.5px solid rgba(90, 100, 110, 0.6);

            }
            .seg-table {

                border-spacing: 0;

                font-size: 13px;
                color: var(--color-turquoise-dark);
            }
            .seg-table thead th {
                background: linear-gradient(135deg, #0e8c9b, #025763);
                color: #fff;
                font-weight: 700;
                padding: 14px 16px;
                text-transform: uppercase;
                font-size: 11.5px;
                letter-spacing: 0.5px;
                position: sticky;
                top: 0;
                z-index: 2;
                border: none;
            }
            .seg-table thead th:first-child {
                border-radius: 13px 0 0 0;
                text-align: left;
                padding-left: 20px;
            }
            .seg-table thead th:last-child {
                border-radius: 0 13px 0 0;
            }
            .seg-table tbody td {
                padding: 12px 14px;
                border-bottom: 1px solid rgba(200, 200, 200, 0.3);
                font-weight: 500;
                background: #ffffff;
                transition: background 0.2s;
            }
            .seg-table tbody td:first-child {
                text-align: left;
                padding-left: 20px;
                font-weight: 600;
                color: var(--color-turquoise-medium);
            }
            .seg-table tbody tr:hover td {
                background: rgba(14, 140, 155, 0.05);
            }
            .seg-table tbody tr:last-child td {
                border-bottom: none;
            }
            .seg-table .row-total td {
                background: rgba(14, 140, 155, 0.08);
                font-weight: 800;
                color: var(--color-turquoise-dark);
                border-top: 2px solid rgba(14, 140, 155, 0.2);
            }
            .seg-table .row-crec td {
                background: rgba(224, 164, 88, 0.08);
                font-weight: 700;
                color: #c77f00;
            }
            .seg-table .row-crec td:first-child {
                color: #c77f00;
            }
            .seg-name-badge {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                background: linear-gradient(
                    135deg,
                    rgba(14, 140, 155, 0.12),
                    rgba(42, 157, 143, 0.08)
                );
                padding: 10px 20px;
                border-radius: 14px;
                font-size: 15px;
                font-weight: 700;
                color: var(--color-turquoise-dark);
                box-shadow: var(--shadow-raised-sm);
                margin-bottom: 6px;
            }
            .seg-name-badge i {
                color: var(--color-turquoise-medium);
                font-size: 18px;
            }

            /* ===== BOTÓN COLAPSAR / EXPANDIR NAVBAR ===== */
            .logo-container {
                justify-content: space-between;
                width: 100%;
            }
            .nav-toggle {
                flex-shrink: 0;
                width: 36px;
                height: 36px;
                border-radius: 11px;
                border: none;
                cursor: pointer;
                background-color: var(--color-bg-gray);
                color: var(--color-turquoise-medium);
                box-shadow: var(--shadow-raised-sm);
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all var(--transition-speed) ease;
            }
            .nav-toggle:hover {
                box-shadow: var(--shadow-sunken-sm);
                color: var(--color-turquoise-dark);
            }
            .nav-toggle i {
                transition: transform var(--transition-speed) ease;
            }

            /* Transiciones suaves de ancho */
            .sidebar {
                transition:
                    transform var(--transition-speed) ease,
                    width var(--transition-speed) ease,
                    padding var(--transition-speed) ease;
            }

            /* Estado colapsado: solo íconos */
            body.nav-collapsed .sidebar {
                width: 78px;
                padding: 35px 14px;
            }
            body.nav-collapsed .main-content {
                margin-left: 78px;
                max-width: calc(100% - 78px);
            }
            body.nav-collapsed .logo-img,
            body.nav-collapsed .country-selector,
            body.nav-collapsed .category-header span,
            body.nav-collapsed .category-header .arrow-icon,
            body.nav-collapsed .category-list,
            body.nav-collapsed .btn-footer-utility span:not(.dot-icon):not(.check-icon):not(.dot-disabled),
            body.nav-collapsed .utility-right,
            body.nav-collapsed .footer-divider {
                display: none !important;
            }
            body.nav-collapsed .logo-container {
                justify-content: center;
            }
            body.nav-collapsed .category-header {
                justify-content: center;
                padding: 12px 0;
            }
            body.nav-collapsed .btn-footer-utility {
                justify-content: center;
                padding: 12px 0;
            }
            body.nav-collapsed .nav-toggle i {
                transform: rotate(180deg);
            }

            /* RESPONSIVE DESIGN */
            @media (max-width: 1200px) {
                .metrics-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }

            @media (max-width: 992px) {
                body {
                    flex-direction: column;
                }

                .sidebar {
                    width: 100%;
                    height: auto;
                    position: static;
                    border-radius: 0 0 24px 24px;
                    padding: 20px;
                    box-shadow: 0 8px 24px var(--shadow-dark);
                    gap: 25px;
                }

                .sidebar-top {
                    gap: 20px;
                }

                .nav-list {
                    flex-direction: row;
                    overflow-x: auto;
                    padding-bottom: 10px;
                    gap: 15px;
                }

                .nav-item {
                    width: auto;
                    flex-shrink: 0;
                }

                .nav-btn {
                    padding: 12px 18px;
                    font-size: 13px;
                }

                .sidebar-footer {
                    display: none; /* Hide desktop utilities on mobile sidebar */
                }

                .main-content {
                    margin-left: 0;
                    max-width: 100%;
                    padding: 20px;
                    gap: 25px;
                }

                .charts-grid.two-columns {
                    grid-template-columns: 1fr;
                }

                .header-bar {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 15px;
                }

                .header-actions {
                    width: 100%;
                    justify-content: space-between;
                }
            }

            @media (max-width: 576px) {
                .metrics-grid {
                    grid-template-columns: 1fr;
                }

                .nav-list {
                    width: 100%;
                }

                .header-actions {
                    flex-direction: row;
                    align-items: center;
                }
            }

            /* Dark Mode para ADG */
            .main-content.adg-dark-mode {

                if (obj === null || obj === undefined) return obj;
                if (typeof obj === 'number') {
                    if (obj >= 2000 && obj <= 2030) return obj; // Keep years
                    return Math.round(obj * 0.65 * 100) / 100;
                }
                if (Array.isArray(obj)) {
                    return obj.map(item => scaleDataForColombia(item));
                }
                if (typeof obj === 'string') {
                    if (obj.endsWith('%')) return obj;
                    const cleaned = obj.replace(/,/g, '').replace('S/ ', '').trim();
                    if (cleaned !== '' && !isNaN(cleaned)) {
                        const numVal = Number(cleaned);
                        if (numVal >= 2000 && numVal <= 2030) return obj; // Year
                        const scaled = Math.round(numVal * 0.65);
                        const formatted = new Intl.NumberFormat("es-PE", { maximumFractionDigits: 0 }).format(scaled);
                        return obj.startsWith('S/ ') ? 'S/ ' + formatted : formatted;
                    }
                    return obj;

                            }

                currentCategory = catKey;
                currentSubCategory = subCatKey;

                // Deactivate all sub-btns
                document.querySelectorAll(".sub-btn").forEach(btn => btn.classList.remove("active"));
                
                // Activate clicked one(s) (handles duplicates in main and nested menus)
                const clickedBtns = document.querySelectorAll(`[onclick*="'${subCatKey}'"]`);
                clickedBtns.forEach(clickedBtn => {
                    clickedBtn.classList.add("active");
                    // Expand parent nested category if button is inside one
                    const parentNested = clickedBtn.closest(".nested-category");
                    if (parentNested) {
                        parentNested.classList.add("expanded");
                    }
                });

                // Get corresponding slides
                const mapping = SUBCAT_MAPPING[subCatKey];
                if (mapping && mapping.slides.length > 0) {
                    selectSlide(mapping.slides[0]);
                    renderSubTabs(subCatKey);
                } else {
                    // Placeholder views (Planeamiento, Créditos, Tesorería, Usuarios, Roles)
                    showPlaceholderView(subCatKey);
                }

                    container.style.display = "none";

                container.style.display = "flex";

                    const slide = SLIDES.find(s => s.id === slideId);
                    if (!slide) return '';
                    const activeClass = (activeSlide === slideId) ? 'active' : '';
                    return `<button class="sub-tab-btn ${activeClass}" onclick="selectSubTab('${slideId}', '${subCatKey}')">${slide.label}</button>`;

            function cloneAndScaleSeguimientoTable(table, factor) {
                const scaledRows = table.rows.map((row) => {
                    const label = row[0];
                    if (label === "% Crec") return row.slice();
                    const scaled = row.slice(1).map((cell) => {
                        const v = num(cell);
                        if (!v) return cell;
                        return new Intl.NumberFormat("es-PE", {
                            maximumFractionDigits: 0,
                        }).format(Math.round(v * factor));
                    });
                    return [label, ...scaled];
                });
                return { headers: table.headers.slice(), rows: scaledRows };
            }

                const role     = slide1Filters.segRole  || "subgerente";
                const personKey = slide1Filters.supervisor || "default";

                // Seedable LCG – unique per role+person combo
                const strHash = (str) => {
                    let h = 5381;
                    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
                    return h >>> 0;
                };
                const baseSeed = strHash(role + "|" + personKey);
                const rand = (extra) => {
                    let s = (baseSeed + extra * 1000003) >>> 0;
                    return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };

                        "JETOUR": 0.09, "JAC": 0.08, "HYUNDAI": 0.07, "CHERY": 0.07,
                        "DFSK": 0.04, "GEELY": 0.03, "CHEVROLET": 0.03
                    };
                    const marcaFactor = marcaFactors[marca] || 1.0;

                    // Zone filter multiplier
                    const zonaFactors = {
                        "Todas": 1.0, "LIMA": 0.71, "AREQUIPA": 0.11, "TRUJILLO": 0.07,
                        "PIURA": 0.05, "CHICLAYO": 0.04, "HUANCAYO": 0.02

                    // Year scale
                    let yearScale = 1.0;
                    if (year === 2026) yearScale = 1.08;
                    else if (year === 2024) yearScale = 0.91;

                    const totalScale = yearScale * countryFactor * marcaFactor * zonaFactor;

                    const scaledFacturacion = baseFacturacion.map(v => Math.round(v * totalScale));
                    const scaledMeta = baseMeta.map(v => Math.round(v * totalScale));

                    const totalFacturacion = scaledFacturacion.reduce((a, b) => a + b, 0);
                    const totalMeta = scaledMeta.reduce((a, b) => a + b, 0);
                    const totalCumplimiento = totalMeta > 0 ? Math.round((totalFacturacion / totalMeta) * 100) : 0;

                    document.getElementById("edb-kpi-meta").textContent = totalMeta.toLocaleString('es-PE');
                    document.getElementById("edb-kpi-cumplimiento").textContent = totalCumplimiento + " %";

                                <td style="text-align: right; font-weight: 600;">${met.toLocaleString('es-PE')}</td>
                                <td class="${cls}" style="text-align: right; font-weight: 700;">${cmp} %</td>
                            </tr>
                        `;

                            <td style="text-align: right;">${totalFacturacion.toLocaleString('es-PE')}</td>

            // ---- REPORT GERENCIAL (slide 10) ----
            function cloneAndScaleReporteGerencialTable(table, factor) {
                const scaledVariables = table.variables.map((variable) => {
                    const name = variable.name;
                    // Don't scale percentages, averages, or decimals
                    if (
                        name.includes("%") ||
                        name === "Productividad" ||
                        name === "CIC Promedio"
                    ) {
                        return { name, values: variable.values.slice() };
                    }
                    const scaledVals = variable.values.map((val) => {
                        if (val == null) return null;
                        if (typeof val === "string") {
                            const numVal =
                                parseFloat(val.replace(/[k$,]/g, "")) *
                                (val.includes("k") ? 1000 : 1);
                            const scaled = Math.round(numVal * factor);
                            return scaled >= 1000
                                ? (scaled / 1000).toFixed(1) + "k"
                                : scaled;
                        }
                        return Math.round(val * factor);
                    });
                    return { name, values: scaledVals };
                });
                return {
                    months: table.months.slice(),
                    variables: scaledVariables,
                };
            }

            function renderCuotaInscripcion(slide, host) {
                ensureSlide11PeopleData();
                const d = dashboardData.slide11;
                const role = slide1Filters.segRole || "supervisor";
                const rolePeople = d.peopleByRole[role] || {};
                const supKey =
                    slide1Filters.supervisor || Object.keys(rolePeople)[0];
                const sup = rolePeople[supKey];
                if (!sup) {
                    renderImage(slide, host);
                    return;
                }

                const fee = sup.feeDistribution;
                const orig = sup.originSales;

                // Select specific month filter
                const monthIdx = Math.min(
                    slide1Filters.from || 0,
                    orig.months.length - 1,
                );
                const selectedMonthName = orig.months[monthIdx];

                // Calculate month factor relative to January (index 0) to dynamically scale the fee distribution table
                const getMonthSalesTotal = (mIdx) =>
                    orig.categories.reduce(
                        (sum, cat) =>
                            sum +
                            ((orig.series[cat] && orig.series[cat][mIdx]) || 0),
                        0,
                    );
                const janTotal = getMonthSalesTotal(0);
                const activeMonthTotal = getMonthSalesTotal(monthIdx);
                const monthFactor = janTotal
                    ? activeMonthTotal / janTotal
                    : 1.0;

                // Scale the fee distribution table dynamically for the selected month
                const scaleFeeTableForMonth = (feeTable, factor) => {
                    const scaledRows = feeTable.rows.map((row) => {
                        const name = row[0];
                        const vals = row
                            .slice(1, -1)
                            .map((v) =>
                                v === ""
                                    ? ""
                                    : String(
                                          Math.max(
                                              1,
                                              Math.round(num(v) * factor),
                                          ),
                                      ),
                            );
                        const rowSum = vals.reduce(
                            (sum, v) => sum + (num(v) || 0),
                            0,
                        );
                        return [name, ...vals, String(rowSum)];
                    });
                    const colTotals = ["Total general"];
                    for (let col = 1; col <= 5; col++) {
                        let colSum = scaledRows.reduce(
                            (sum, r) => sum + (num(r[col]) || 0),
                            0,
                        );
                        colTotals.push(colSum === 0 ? "" : String(colSum));
                    }
                    colTotals.push(
                        String(
                            colTotals
                                .slice(1)
                                .reduce((sum, v) => sum + num(v), 0),
                        ),
                    );
                    return {
                        headers: feeTable.headers.slice(),
                        rows: scaledRows,
                        totals: colTotals,
                    };
                };

                const monthlyFee = scaleFeeTableForMonth(fee, monthFactor);

                // Calculate totals for metric cards based on the selected month
                const totalEnrollments = num(
                    monthlyFee.totals[monthlyFee.totals.length - 1],
                );
                const totalLeadsSales = orig.series["Leads"]
                    ? orig.series["Leads"][monthIdx] || 0
                    : 0;
                const totalPdvSales = orig.series["Punto de Venta"]
                    ? orig.series["Punto de Venta"][monthIdx] || 0
                    : 0;
                const totalRsvSales = orig.series[
                    "Redes Sociales Vendedor (RSV)"
                ]
                    ? orig.series["Redes Sociales Vendedor (RSV)"][monthIdx] ||
                      0
                    : 0;

                renderMetricCards([
                    {
                        title: `Inscripciones (${selectedMonthName.toUpperCase().slice(0, 3)})`,
                        value: nf(totalEnrollments),
                        icon: "fa-user-check",
                        trendText: "Vendedores con cuota",
                        trendUp: true,
                        accentColor: "#0E8C9B",
                    },
                    {
                        title: `Ventas por Leads (${selectedMonthName.toUpperCase().slice(0, 3)})`,
                        value: nf(totalLeadsSales),
                        icon: "fa-bullhorn",
                        trendText: "Canal leads",
                        trendUp: true,
                        accentColor: "#3A7CA5",
                    },
                    {
                        title: `Ventas Punto de Venta (${selectedMonthName.toUpperCase().slice(0, 3)})`,
                        value: nf(totalPdvSales),
                        icon: "fa-store",
                        trendText: "Canal físico",
                        trendUp: true,
                        accentColor: "#E0A458",
                    },
                    {
                        title: `Ventas Redes Sociales (${selectedMonthName.toUpperCase().slice(0, 3)})`,
                        value: nf(totalRsvSales),
                        icon: "fa-hashtag",
                        trendText: "Canal digital",
                        trendUp: true,
                        accentColor: "#9B5DE5",
                    },
                ]);

                const th1 = monthlyFee.headers
                    .map((h) => `<th>${h}</th>`)
                    .join("");
                let tb1 = monthlyFee.rows
                    .map((row) => {
                        const isZero = row[row.length - 1] === "0";
                        const style = isZero ? ' style="opacity: 0.5;"' : "";
                        const cells = row
                            .map((c, i) =>
                                i === 0
                                    ? `<td style="text-align: left; padding-left: 15px;"><strong>${c}</strong></td>`
                                    : `<td>${c || "—"}</td>`,
                            )
                            .join("");
                        return `<tr${style}>${cells}</tr>`;
                    })
                    .join("");
                tb1 += `<tr class="row-total">${monthlyFee.totals.map((c, i) => (i === 0 ? `<td style="text-align: left; padding-left: 15px;">${c}</td>` : `<td>${c || "—"}</td>`)).join("")}</tr>`;

                // Build Table 2
                const th2 = ["Origen de la Venta", ...orig.months, "Total"]
                    .map((h) => `<th>${h}</th>`)
                    .join("");

                let tb2 = "";
                const monthlyTotals = new Array(orig.months.length).fill(0);
                let cumulativeGrandTotal = 0;

                orig.categories.forEach((cat) => {
                    const rowVals = orig.series[cat] || [];
                    const rowSum = rowVals.reduce(
                        (sum, v) => sum + (v || 0),
                        0,
                    );
                    cumulativeGrandTotal += rowSum;
                    const cells = rowVals
                        .map((v, i) => {
                            monthlyTotals[i] += v || 0;
                            return `<td>${v == null ? "—" : nf(v)}</td>`;

                        .join("");
                    tb2 += `<tr><td style="text-align: left; padding-left: 15px;"><strong>${cat}</strong></td>${cells}<td><strong>${nf(rowSum)}</strong></td></tr>`;
                });
                tb2 +=
                    `<tr class="row-total"><td style="text-align: left; padding-left: 15px;">Total general</td>` +
                    monthlyTotals
                        .map((v) => `<td>${nf(v)}</td>`)
                        .join("") +
                    `<td>${nf(cumulativeGrandTotal)}</td></tr>`;

                host.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 20px;">
          <section class="table-card" style="margin: 0;">
            <div class="table-card-header"><h3 class="table-card-title"><i class="fa-solid fa-receipt"></i><span>Cuota de Inscripción por Vendedor (${selectedMonthName})</span></h3></div>

                    const scaledMatrix = prodTable.matrix.map((row) => {
                        return row.map((v) => Math.round(v * factor));

                        (sum, r) => sum + r.reduce((s, v) => s + v, 0),
                        0,

                    return {
                        name: prodTable.name,
                        totalSellers: total,
                        matrix: scaledMatrix,
                    };

                    let adjFactor = 1.0;

                    const selectedCat = window.slide18Filters.category;

                    if (selectedCat === "Todas") {

                    const selectedCat = window.slide18Filters.category;
                    const selectedSub = window.slide18Filters.subcategory;

                    // Scaling factor for country (Peru vs Colombia)
                    const countryFactor = (selectedCountry === 'colombia') ? 0.65 : 1.0;

                    // Apply filters to data
                    let filteredData = rawData.map(item => ({
                        ...item,
                        calls: Math.round(item.calls * countryFactor)
                    }));

                    // Calculate totals & percentages
                    const grandTotalCalls = filteredData.reduce((sum, item) => sum + item.calls, 0);

                    // Filter based on Category and Subcategory
                    let displayData = [...filteredData];
                    if (selectedCat !== "Todas") {
                        displayData = displayData.filter(item => item.category === selectedCat);
                    }
                    if (selectedSub !== "Todas") {
                        displayData = displayData.filter(item => item.subcategory === selectedSub);

                    const activeTotalCalls = displayData.reduce((sum, item) => sum + item.calls, 0);

                    // RENDER TABLE
                    const tableTbody = document.getElementById("cc-table-tbody");
                    
                    // Group calls by category for the table rows
                    const categoryGroup = {};
                    categories.forEach(c => {
                        categoryGroup[c] = 0;
                    });
                    
                    displayData.forEach(item => {
                        if (categoryGroup[item.category] !== undefined) {
                            categoryGroup[item.category] += item.calls;
                        }
                    });

                    // Render only rows that have calls > 0
                    let tableHtml = "";
                    categories.forEach(cat => {
                        const val = categoryGroup[cat];
                        if (val > 0) {
                            tableHtml += `
                                <tr>
                                    <td>${year} ${month}</td>
                                    <td>${cat}</td>
                                    <td style="text-align: right; font-weight: 600;">${val.toLocaleString('es-PE')}</td>

                    tableTbody.innerHTML = tableHtml;

                    // RENDER CATEGORY CHART
                    // Prepare data grouped by category (sorted descending)
                    const categoryChartData = categories.map(cat => {
                        const sumCalls = filteredData
                            .filter(item => item.category === cat)
                            .reduce((sum, item) => sum + item.calls, 0);
                        return { category: cat, calls: sumCalls };
                    }).sort((a, b) => b.calls - a.calls);

                    // Filters highlights
                    const catLabels = categoryChartData.map(d => d.category);
                    const catCalls = categoryChartData.map(d => d.calls);
                    const catPercentages = catCalls.map(c => grandTotalCalls > 0 ? Math.round((c / grandTotalCalls) * 100) : 0);

                    // Render Category Chart
                    drawChart("cc-chart-category", {
                        type: "bar",
                        data: {
                            labels: catLabels,
                            datasets: [

                                    label: "Cant. Llamadas",

                                    yAxisID: "y",

                                        anchor: "end",

                                            const chart = context.chart;
                                            if (!chart.scales || !chart.scales.y || !chart.scales.y1) return 'start';
                                            const redVal = chart.data.datasets[0].data[idx];
                                            const blueVal = chart.data.datasets[1].data[idx];
                                            const yPixel = chart.scales.y.getPixelForValue(redVal);
                                            const y1Pixel = chart.scales.y1.getPixelForValue(blueVal);
                                            return (y1Pixel < yPixel) ? 'start' : 'end';
                                        },
                                        offset: 4,
                                        color: "#ffffff",
                                        backgroundColor: "#f25c66",
                                        borderRadius: 3,
                                        font: { family: "Inter", weight: "700", size: 9 },
                                        padding: { top: 3, bottom: 3, left: 6, right: 6 }
                                    }
                                },

                                    data: catPercentages,

            function renderSalesTable(isMonto) {
                const data = dashboardData.slide1;
                const table = document.getElementById("dyn-table");
                const years = Object.keys(data.years)
                    .map(Number)
                    .sort((a, b) => a - b);
                const fmt = (v) =>
                    new Intl.NumberFormat("es-PE", {
                        maximumFractionDigits: 0,
                    }).format(v);
                const sel = slide1Filters.year;
                const pref = isMonto ? "S/ " : "";

                years.forEach((y) => {
                    head += `<th class="${y === sel ? "col-selected" : ""}">${y}</th>`;

                    avgRow = [];
                years.forEach((y) => {
                    const serie =
                        (isMonto
                            ? data.years[y].monto
                            : data.years[y].cantidad) || [];
                    const vals = serie.filter((v) => v != null);
                    const total = vals.reduce((a, v) => a + v, 0);
                    const avg = vals.length ? total / vals.length : 0;
                    totalRow.push({ y, v: total });
                    avgRow.push({ y, v: Math.round(avg) });
                });

                let body = `<tbody><tr><td class="row-label-total"><i class="fa-solid fa-coins"></i> TOTAL</td>`;

            // ============ RENDER COMPLETO DEL SLIDE 1 (según filtros) ============
            function renderSlide1() {
                const data = dashboardData.slide1;
                const { metric, year, from, to } = slide1Filters;
                const isMonto = metric === "monto";
                const months = data.months;

                const cur = data.years[year] || {};
                const prev = data.years[year - 1] || {};

                const curSeries = isMonto ? cur.monto : cur.cantidad;
                const prevSeries = isMonto ? prev.monto : prev.cantidad;
                const presSeries = isMonto
                    ? cur.presupuestoMonto
                    : cur.presupuesto;

                // Recorte por periodo (desde - hasta)
                const labels = months.slice(from, to + 1);
                const curVals = (curSeries || []).slice(from, to + 1);
                const prevVals = (prevSeries || []).slice(from, to + 1);
                const presVals = (presSeries || []).slice(from, to + 1);

                // Título y subtítulo
                const fromName = MONTH_NAMES[from],
                    toName = MONTH_NAMES[to];
                const periodTxt =
                    from === to ? fromName : `${fromName} – ${toName}`;
                document.getElementById("dashboard-title").textContent =
                    `${data.title}: ${periodTxt} ${year}`;
                document.getElementById("dashboard-subtitle").textContent =
                    `Métrica: ${isMonto ? "Monto (S/.)" : "Cantidad de ventas"} · Comparativo ${year} vs ${year - 1} vs Presupuesto`;
                document.getElementById("slide1-chart-title").textContent =
                    `${isMonto ? "Monto" : "Cantidad"} de ventas (${year} vs ${year - 1} vs Presupuesto)`;

                // Métricas (KPIs) calculadas sobre el periodo seleccionado
                renderSlide1Metrics(curVals, presVals, prevVals, isMonto, year);

                // Gráfico y tabla
                initChartSlide1({
                    labels,
                    curVals,
                    prevVals,
                    presVals,
                    year,
                    isMonto,
                });
                renderSlide1Legend(year);
                renderTableSlide1(isMonto);
            }

            // KPIs del slide 1
            function renderSlide1Metrics(
                curVals,
                presVals,
                prevVals,
                isMonto,
                year,
            ) {
                const sum = (arr) => arr.reduce((a, v) => a + (v || 0), 0);
                const count = (arr) => arr.filter((v) => v != null).length;

                const totalCur = sum(curVals);
                const nMonths = count(curVals) || 1;
                const avgCur = totalCur / nMonths;
                const totalPres = sum(presVals);
                const totalPrev = sum(prevVals);
                const compliance = totalPres ? (totalCur / totalPres) * 100 : 0;
                const yoy = totalPrev
                    ? ((totalCur - totalPrev) / totalPrev) * 100
                    : 0;

                const fmt = (v) =>
                    isMonto
                        ? "S/ " +
                          new Intl.NumberFormat("es-PE", {
                              maximumFractionDigits: 0,
                          }).format(v)
                        : new Intl.NumberFormat("es-PE", {
                              maximumFractionDigits: 0,
                          }).format(v);

                const cards = [
                    {
                        title: `Ventas Totales ${year}`,
                        value: fmt(totalCur),
                        icon: "fa-solid fa-cart-shopping",
                        trendText: `${yoy >= 0 ? "+" : ""}${yoy.toFixed(1)}% vs ${year - 1}`,
                        trendUp: yoy >= 0,
                        accentColor: "#0E8C9B",
                    },
                    {
                        title: "Promedio Mensual",
                        value: fmt(Math.round(avgCur)),
                        icon: "fa-solid fa-calculator",
                        trendText: `${nMonths} mes(es) con data`,
                        trendUp: true,
                        accentColor: "#3A7CA5",
                    },
                    {
                        title: "Meta Acumulada",
                        value: fmt(totalPres),
                        icon: "fa-solid fa-bullseye",
                        trendText: "Presupuesto del periodo",
                        trendUp: true,
                        accentColor: "#E0A458",
                    },
                    {
                        title: "Cumplimiento",
                        value: compliance.toFixed(1) + "%",
                        icon: "fa-solid fa-percentage",
                        trendText: `${compliance >= 100 ? "+" : ""}${(compliance - 100).toFixed(1)}% vs meta`,
                        trendUp: compliance >= 100,
                        accentColor: "#E2674F",
                    },
                ];
                renderMetricCards(cards);
            }
